      saveLocalDraftForCurrentVvd();
    }

    async function handleVvdInput() {
      try {
        await syncLaneFromVvd();
      } catch (error) {
        console.warn(error);
      }
    }

    async function handleLaneInput() {
      $("serviceLane").value = normalizeLane($("serviceLane").value);
      try {
        const rows = await loadScheduleRows();
        populateLaneOptions(rows, "");
        populateVvdOptions(rows, $("serviceLane").value);
      } catch (error) {
        console.warn(error);
      }
    }

    async function initializePage() {
      state.initialized = true;
      $("status").textContent = "Ready";
      $("scheduleSummary").textContent = "尚未读取船期";
      $("summaryLine").textContent = "Schedule preview";
      renderHistory();
      try {
        await Promise.all([
          loadScheduleRows(),
          loadSharedCache(true)
        ]);
        renderHistory();
        $("status").textContent = "Ready";
      } catch (error) {
        console.warn(error);
        $("status").textContent = "船期或历史读取失败";
      }
    }

    document.querySelector(".topbar .toolbar")?.remove();
    updateTokenUi();

    $("generate").addEventListener("click", () => generateFromSchedule({ forceSchedule: true }));
    $("clearInputs").addEventListener("click", clearCurrentInputs);
    $("loadSample").addEventListener("click", () => {
      setSample();
      render();
    });
    $("parseBulk").addEventListener("click", parseBulkInput);
    $("copyTable").addEventListener("click", copyTable);
    $("exportXls").addEventListener("click", exportXls);
    $("saveSync").addEventListener("click", saveAndSyncCurrentVvd);
    $("saveToken").addEventListener("click", saveGithubTokenFromInput);
    $("clearToken").addEventListener("click", () => {
      setGithubToken("");
      $("status").textContent = "GitHub Token 已清除";
    });
    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => {
        state.activeSheet = button.dataset.sheet;
        document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab === button));
        rerenderIfScheduleReady();
      });
    });

    $("sheetWrap").addEventListener("input", (event) => {
      if (event.target.matches(".editable")) {
        saveCellEntry(event.target, activeTable()?.dataset.sheet || state.activeSheet);
        recalcTable(activeTable());
      }
    });

    $("syncTeus").addEventListener("click", syncTeuPair);
    $("syncRf").addEventListener("click", syncRfPair);
    $("wbTeus").addEventListener("input", () => handleTeuInput("wbTeus"));
    $("ebTeus").addEventListener("input", () => handleTeuInput("ebTeus"));
    $("wbMt").addEventListener("input", () => handleWeightInput("wbMt", "wbTeus"));
    $("ebMt").addEventListener("input", () => handleWeightInput("ebMt", "ebTeus"));
    $("wbRf").addEventListener("input", () => handleRfInput("wbRf"));
    $("ebRf").addEventListener("input", () => handleRfInput("ebRf"));
    $("tonPerTeu").addEventListener("input", handleTonPerTeuInput);
    $("addCarrier").addEventListener("click", () => {
      const carriers = readCarrierRows();
      carriers.push(defaultCarrier(""));
      renderCarrierRows(carriers);
      rerenderIfScheduleReady();
    });
    $("carrierRows").addEventListener("input", (event) => {
      const input = event.target.closest("input[data-field]");
      if (!input) return;
      const row = input.closest("[data-carrier-row]");
      if (!row) return;
      const field = input.dataset.field;
      if (field === "code") input.value = carrierCode(input.value, "");
      if (field === "wbTeus" || field === "ebTeus" || field === "tonPerTeu") updateCarrierWeights(row);
      if (field === "wbMt") updateCarrierRatioFromWeight(row, "wbMt", "wbTeus");
      if (field === "ebMt") updateCarrierRatioFromWeight(row, "ebMt", "ebTeus");
      syncLegacyInputsFromCarriers();
      rerenderIfScheduleReady();
    });
    $("carrierRows").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const row = button.closest("[data-carrier-row]");
      if (!row) return;
      if (button.dataset.action === "syncAll") {
        syncCarrierToEb(row);
      } else if (button.dataset.action === "remove") {
        const carriers = readCarrierRows();
        const rows = [...$("carrierRows").querySelectorAll("[data-carrier-row]")];
        const index = rows.indexOf(row);
        if (carriers.length > 1 && index >= 0) carriers.splice(index, 1);
        renderCarrierRows(carriers.length ? carriers : [defaultCarrier()]);
      }
      syncLegacyInputsFromCarriers();
      rerenderIfScheduleReady();
    });
    $("serviceLane").addEventListener("input", handleLaneInput);
    $("serviceLane").addEventListener("change", handleLaneInput);
    $("vvd").addEventListener("input", handleVvdInput);
    $("vvd").addEventListener("change", generateFromSchedule);
    $("historySearch").addEventListener("input", renderHistory);
    $("historySearch").addEventListener("change", renderHistory);
    $("historyAction").addEventListener("click", handleHistoryAction);

    renderCarrierRows([defaultCarrier()]);
    initializePage();
  </script>
</body>
</html>
