<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Space Control Generator</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f4f6f8;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #c7d0dc;
      --line-strong: #1d2939;
      --blue: #92c8f6;
      --blue-dark: #5a9bd6;
      --yellow: #fff200;
      --input: #f8fafc;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --danger: #c1121f;
      --warn-bg: #fff6cc;
      --bad-bg: #ffe1e1;
      --good-bg: #d9f2dd;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--text);
      font-size: 14px;
    }

    .app {
      min-height: 100vh;
      display: block;
    }

    .control-shell {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .workspace {
      min-width: 0;
      width: 100%;
    }

    .generation-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 8px rgba(16, 24, 40, 0.08);
    }

    .title-row {
      display: flex;
      align-items: center;
      min-height: 42px;
      padding: 8px 18px;
      background: #ffffff;
      border-bottom: 1px solid #dbe4ee;
    }

    .generation-controls {
      display: grid;
      grid-template-columns: minmax(360px, 0.9fr) minmax(500px, 1.35fr);
      align-items: end;
      gap: 14px;
      padding: 8px 18px 9px;
      background: #ddecfa;
      border-left: 4px solid var(--blue-dark);
    }

    .generation-fields {
      display: grid;
      grid-template-columns: minmax(120px, 0.7fr) minmax(180px, 1fr);
      gap: 8px;
      min-width: 0;
    }

    .generation-fields .field {
      padding: 5px 7px 7px;
      border: 1px solid #9fc3e2;
      border-radius: 6px;
      background: #cfe5f8;
    }

    .generation-fields label {
      margin-bottom: 3px;
      color: #24577f;
    }

    .generation-fields input {
      min-height: 32px;
      padding: 6px 8px;
      background: #ffffff;
      border-color: #7faed4;
    }

    .generation-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .generation-actions button {
      white-space: nowrap;
    }

    .generation-actions .status {
      min-width: 0;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .control-summary {
      display: grid;
      grid-template-columns: minmax(220px, 0.7fr) minmax(0, 1.3fr);
      gap: 14px;
      align-items: center;
      padding: 8px 18px;
      background: #f5f9fc;
      border-bottom: 1px solid var(--line);
    }

    .control-summary .schedule-inline {
      margin: 0;
      padding: 5px 8px;
    }

    .control-content {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 10px;
      padding: 10px 18px 12px;
      background: #eef2f6;
    }

    .control-panel.section {
      min-width: 0;
      margin: 0;
      padding: 10px 12px;
      border-top: 3px solid var(--line);
      border-radius: 6px;
    }

    .partner-panel {
      grid-column: 1 / -1;
      background: #edf8f5;
      border-top-color: #63a89d !important;
    }

    .history-panel.control-panel {
      grid-column: span 4;
      background: #eef5fb;
      border-top-color: #5a9bd6 !important;
    }

    .pod-panel {
      grid-column: span 5;
      background: #fff9e8;
      border-top-color: #d3ad43 !important;
    }

    .sync-panel.control-panel {
      grid-column: span 3;
      background: #f5f6f8;
      border-top-color: #98a2b3 !important;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtle {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      font: inherit;
      line-height: 1;
      cursor: pointer;
      min-height: 30px;
    }

    button:hover {
      border-color: var(--blue-dark);
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    button.export-button {
      min-height: 32px;
      font-size: 13px;
    }

    button.sync-save {
      border-color: var(--accent);
      color: var(--accent-strong);
      font-weight: 700;
    }

    .sync-settings {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: end;
      margin-top: 10px;
    }

    .sync-settings .field {
      margin: 0;
    }

    .history-tools {
      display: grid;
      grid-template-columns: minmax(220px, 460px) auto;
      gap: 8px;
      align-items: end;
    }

    .history-panel {
      padding-top: 0;
    }

    .history-panel summary {
      cursor: pointer;
      padding: 4px 0;
      font-size: 14px;
      font-weight: 700;
    }

    .history-panel[open] summary {
      padding-bottom: 8px;
    }

    .history-count {
      margin-left: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .history-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 7px;
      margin-top: 10px;
    }

    .history-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
    }

    .history-item {
      width: 100%;
      text-align: left;
      line-height: 1.25;
      padding: 8px 9px;
      min-height: 0;
    }

    .history-item strong,
    .history-item span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-item span {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .history-delete,
    .history-clear {
      color: var(--danger);
      font-weight: 700;
    }

    .history-delete {
      min-width: 28px;
      min-height: 28px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .schedule-input-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.7fr) minmax(0, 1fr);
      gap: 10px;
    }

    .schedule-inline {
      margin-top: 10px;
      padding: 9px 10px;
      border-left: 3px solid var(--blue-dark);
      background: #f8fafc;
    }

    .section {
      border-top: 1px solid var(--line);
      padding-top: 15px;
      margin-top: 15px;
    }

    .section:first-child {
      border-top: 0;
      margin-top: 0;
      padding-top: 0;
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 8px;
    }

    .section-heading h2 {
      margin: 0;
    }

    .small-button {
      min-height: 28px;
      padding: 5px 8px;
      font-size: 12px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 14px;
      line-height: 1.2;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      min-width: 0;
    }

    .pair-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px minmax(0, 1fr);
      align-items: end;
      gap: 8px;
    }

    .sync-button {
      min-width: 38px;
      padding: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action-grid .wide-action {
      grid-column: 1 / -1;
    }

    .export-progress {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px 10px;
      align-items: center;
      margin-top: 10px;
    }

    .top-progress {
      margin: 0;
      padding: 7px 18px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .export-progress progress {
      width: 100%;
      height: 9px;
      accent-color: var(--accent);
    }

    .export-progress span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .export-progress .export-progress-text {
      grid-column: 1 / -1;
    }

    .port-options {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 6px;
      margin-top: 8px;
    }

    .port-option {
      display: flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      padding: 6px 7px;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      margin: 0;
    }

    .port-option input {
      width: auto;
      min-height: 0;
      margin: 0;
      padding: 0;
    }

    .carrier-table-wrap {
      overflow: visible;
    }

    .partner-editor {
      display: grid;
      gap: 8px;
    }

    .partner-row {
      display: grid;
      grid-template-columns: 110px 72px 80px 92px 72px 32px 80px 92px 72px 24px;
      gap: 8px;
      align-items: end;
      justify-content: start;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #ffffff;
    }

    .partner-row-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(72px, 0.65fr) 24px;
      gap: 6px;
      align-items: end;
      margin-bottom: 0;
    }

    .partner-metrics {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 32px minmax(0, 1fr);
      gap: 8px;
      align-items: end;
    }

    .partner-metrics + .partner-metrics {
      margin-top: 0;
    }

    .partner-field {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .partner-field span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      line-height: 1.1;
    }

    .partner-field input {
      min-height: 30px;
      padding: 5px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .partner-field input[data-field="code"] {
      font-weight: 700;
      text-transform: uppercase;
    }

    .partner-field input[data-field^="wb"] {
      background: #eef6fd;
      border-color: #9fc3e2;
    }

    .partner-field input[data-field^="eb"] {
      background: #fff9e8;
      border-color: #d8bd70;
    }

    .partner-field input[data-field="tonPerTeu"] {
      background: #edf8f5;
      border-color: #8cc1b8;
    }

    .partner-row .mini-sync {
      min-width: 32px;
      min-height: 30px;
      padding: 0;
      font-size: 13px;
      font-weight: 700;
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .partner-row .metric-spacer {
      min-height: 30px;
    }

    .partner-row .remove-carrier {
      width: 24px;
      min-width: 24px;
      min-height: 30px;
      padding: 0;
      color: var(--danger);
      font-weight: 700;
      justify-self: end;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--input);
      color: var(--text);
      font: inherit;
      padding: 8px 9px;
      min-height: 36px;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.35;
    }

    input:focus,
    textarea:focus {
      outline: 2px solid rgba(15, 118, 110, 0.18);
      border-color: var(--accent);
      background: #ffffff;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .tabs {
      display: none;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #ffffff;
    }

    .tab {
      border: 0;
      border-radius: 0;
      min-width: 64px;
      background: #ffffff;
    }

    .tab.active {
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 10px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .preview {
      padding: 0 18px 24px;
      overflow: visible;
      min-height: 0;
    }

    .preview-heading {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 16px 18px 10px;
      background: #e8f3fb;
      border-top: 1px solid #c6d9ea;
      border-bottom: 1px solid #c6d9ea;
    }

    .preview-heading h2 {
      margin: 0;
      font-size: 16px;
    }

    .sheet-wrap {
      min-width: 100%;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid var(--line);
    }

    .schedule-view {
      min-width: 0;
      padding: 16px;
      background: #ffffff;
    }

    .schedule-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      margin-bottom: 14px;
    }

    .schedule-title {
      margin: 0 0 5px;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
    }

    .schedule-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .allocation-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(76px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .preview-section-title {
      margin: 14px 0 7px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    table.partner-summary-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin-bottom: 14px;
      font-size: 12px;
    }

    .partner-summary-table th,
    .partner-summary-table td {
      border: 1px solid var(--line);
      padding: 7px 8px;
      text-align: right;
      white-space: nowrap;
    }

    .partner-summary-table th {
      background: #eef4f8;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .partner-summary-table th:first-child,
    .partner-summary-table td:first-child {
      width: 110px;
      text-align: left;
      font-weight: 700;
    }

    .metric-box {
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: 6px;
      padding: 8px 9px;
      min-height: 52px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .metric-value {
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    table.schedule-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
      background: #ffffff;
    }

    .schedule-table th,
    .schedule-table td {
      border: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    .schedule-table th {
      background: #e8f3fb;
      color: #111827;
      font-weight: 700;
    }

    .schedule-table .meta-col {
      width: 96px;
      white-space: nowrap;
    }

    .route-cell {
      min-height: 88px;
    }

    .route-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .port-chain {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .port-call {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      border: 1px solid #b9c6d6;
      border-radius: 6px;
      background: #ffffff;
      padding: 5px 7px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .port-call strong {
      font-size: 12px;
    }

    .port-call span {
      color: var(--muted);
      font-size: 11px;
    }

    .port-call.skip {
      background: var(--yellow);
      border-color: #d6c400;
      color: var(--danger);
      font-weight: 700;
    }

    .empty-route {
      color: var(--muted);
      font-size: 12px;
    }

    table.space-table {
      border-collapse: collapse;
      table-layout: fixed;
      width: max-content;
      min-width: 100%;
      background: #ffffff;
      font-size: 10px;
      color: #101828;
    }

    .space-table th,
    .space-table td {
      border: 1px solid #1f2937;
      height: 22px;
      padding: 2px 4px;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .space-table .top-title {
      background: var(--blue);
      font-weight: 700;
      height: 20px;
      border-bottom-width: 2px;
    }

    .space-table .header {
      background: var(--blue);
      font-weight: 700;
    }

    .space-table .alloc-input {
      background: var(--yellow);
      font-weight: 700;
    }

    .space-table .fixed-left {
      width: 44px;
      min-width: 44px;
    }

    .space-table .fixed-mid {
      width: 48px;
      min-width: 48px;
    }

    .space-table .label {
      width: 58px;
      min-width: 58px;
      text-align: left;
      font-weight: 700;
    }

    .space-table .pod-col {
      width: 48px;
      min-width: 48px;
    }

    .space-table .sum-col {
      width: 58px;
      min-width: 58px;
    }

    .space-table .block-port {
      font-weight: 700;
    }

    .space-table .block-line td {
      border-top-width: 2px;
    }

    .space-table .block-end td {
      border-bottom-width: 2px;
    }

    .space-table .editable {
      background: #ffffff;
      cursor: text;
    }

    .space-table .editable:focus {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      background: #f0fdfa;
    }

    .space-table .computed {
      background: #fafafa;
      color: #1f2937;
      font-weight: 700;
    }

    .space-table .muted-cell {
      color: var(--muted);
      background: #f8fafc;
    }

    .space-table .skip {
      background: var(--yellow);
      color: var(--danger);
      font-weight: 700;
    }

    .space-table .bad {
      background: var(--bad-bg);
      color: var(--danger);
      font-weight: 700;
    }

    .space-table .good {
      background: var(--good-bg);
      font-weight: 700;
    }

    .space-table .warn {
      background: var(--warn-bg);
      color: var(--danger);
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 1180px) {
      .generation-controls {
        grid-template-columns: minmax(320px, 1fr);
      }

      .generation-actions {
        justify-content: flex-start;
      }

      .partner-row {
        grid-template-columns: 110px 72px repeat(3, minmax(72px, 1fr)) 32px;
      }
    }

    @media (max-width: 900px) {
      .history-panel.control-panel {
        grid-column: span 5;
      }

      .pod-panel {
        grid-column: span 7;
      }

      .sync-panel.control-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .title-row {
        min-height: 38px;
        padding: 7px 12px;
      }

      .generation-controls {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 8px 12px;
        border-left-width: 3px;
      }

      .control-summary {
        grid-template-columns: 1fr;
      }

      .generation-actions {
        grid-column: auto;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        overflow: visible;
      }

      .generation-actions button,
      .generation-actions .status {
        width: 100%;
      }

      .generation-actions .status {
        grid-column: 1 / -1;
        max-width: none;
        min-height: 22px;
        padding: 0;
      }

      .control-summary,
      .control-content,
      .preview-heading,
      .preview {
        padding-left: 12px;

    const $ = (id) => document.getElementById(id);

    function emptySharedCache() {
      return { version: 1, updatedAt: "", records: {} };
    }

    function normalizeSharedCache(cache) {
      const normalized = emptySharedCache();
      normalized.version = Number(cache?.version) || 1;
      normalized.updatedAt = normalizeText(cache?.updatedAt);
      Object.entries(cache?.records || {}).forEach(([key, record]) => {
        const vvd = cleanVvd(record?.vvd || key);
        if (!vvd) return;
        normalized.records[vvd] = { ...record, vvd };
      });
      return normalized;
    }

    function parseJsonSafe(text, fallback) {
      try {
        return JSON.parse(text);
      } catch {
        return fallback;
      }
    }

    function loadStorageJson(key, fallback) {
      try {
        const text = window.localStorage?.getItem(key);
        if (!text) return fallback;
        return JSON.parse(text);
      } catch {
        return fallback;
      }
    }

    function saveStorageJson(key, value) {
      try {
        window.localStorage?.setItem(key, JSON.stringify(value));
      } catch {
        // Local storage may be disabled; GitHub sync still works with a token.
      }
    }

    function cacheReadUrls() {
      const stamp = Date.now();
      return [
        `${CACHE_FILE_PATH}?ts=${stamp}`,
        `${REMOTE_CACHE_URL}?ts=${stamp}`
      ];
    }

    async function loadSharedCache(force = false) {
      if (!force && state.sharedCache) return state.sharedCache;
      if (!force && state.sharedCachePromise) return state.sharedCachePromise;
      state.sharedCachePromise = (async () => {
        for (const url of cacheReadUrls()) {
          try {
            const response = await fetch(url, { cache: "no-store" });
            if (response.status === 404) continue;
            if (!response.ok) continue;
            const text = await response.text();
            state.sharedCache = normalizeSharedCache(parseJsonSafe(text, emptySharedCache()));
            return state.sharedCache;
          } catch {
            // Try the next cache source.
          }
        }
        state.sharedCache = emptySharedCache();
        return state.sharedCache;
      })();
      try {
        return await state.sharedCachePromise;
      } finally {
        state.sharedCachePromise = null;
      }
    }

    function getLocalDrafts() {
      const drafts = loadStorageJson(LOCAL_DRAFTS_KEY, {});
      return drafts && typeof drafts === "object" ? drafts : {};
    }

    function saveLocalDraftRecord(record) {
      if (!record?.vvd) return;
      const drafts = getLocalDrafts();
      drafts[record.vvd] = record;
      saveStorageJson(LOCAL_DRAFTS_KEY, drafts);
    }

    function clearLocalDraft(vvd) {
      const key = cleanVvd(vvd);
      if (!key) return;
      const drafts = getLocalDrafts();
      if (!drafts[key]) return;
      delete drafts[key];
      saveStorageJson(LOCAL_DRAFTS_KEY, drafts);
    }

    function getLocalHistory() {
      const history = loadStorageJson(LOCAL_HISTORY_KEY, []);
      return Array.isArray(history) ? history.filter((record) => cleanVvd(record?.vvd)) : [];
    }

    function historyKey(record) {
      return `${cleanVvd(record?.vvd)}::${normalizeLane(record?.lane || "")}`;
    }

    function normalizeHistoryRecord(record, source = "local") {
      return {
        vvd: cleanVvd(record?.vvd),
        lane: normalizeLane(record?.lane || ""),
        vesselName: normalizeText(record?.vesselName || ""),
        updatedAt: normalizeText(record?.updatedAt) || new Date().toISOString(),
        source
      };
    }

    function saveHistoryRecord(record, source = "generated") {
      const normalized = normalizeHistoryRecord(record, source);
      if (!normalized.vvd) return;
      const records = [normalized, ...getLocalHistory()];
      const seen = new Set();
      const compact = [];
      records
        .sort((a, b) => recordTime(b) - recordTime(a))
        .forEach((item) => {
          const key = historyKey(item);
          if (!key || seen.has(key)) return;
          seen.add(key);
          compact.push(item);
        });
      saveStorageJson(LOCAL_HISTORY_KEY, compact.slice(0, 10));
      renderHistory();
    }

    function removeLocalHistoryRecord(record) {
      const key = historyKey(record);
      const remaining = getLocalHistory().filter((item) => historyKey(item) !== key);
      saveStorageJson(LOCAL_HISTORY_KEY, remaining);
    }

    function clearLocalHistoryRecords() {
      saveStorageJson(LOCAL_HISTORY_KEY, []);
    }

    function combinedHistoryRecords() {
      const records = getLocalHistory();
      const byKey = new Map();
      records.forEach((record) => {
        const normalized = normalizeHistoryRecord(record, record.source || "local");
        if (!normalized.vvd) return;
        const key = historyKey(normalized);
        const existing = byKey.get(key);
        if (!existing || recordTime(normalized) > recordTime(existing)) byKey.set(key, normalized);
      });
      return [...byKey.values()].sort((a, b) => recordTime(b) - recordTime(a)).slice(0, 10);
    }

    function historyDisplay(record) {
      const lane = record.lane || "-";
      const vessel = record.vesselName || "-";
      return `${record.vvd} · ${lane} · ${vessel}`;
    }

    function historyMatches(record, query) {
      const q = normalizeText(query).toUpperCase();
      if (!q) return true;
      return [record.vvd, record.lane, record.vesselName].some((value) => normalizeText(value).toUpperCase().includes(q));
    }

    function updateHistoryActionButton(recordCount = combinedHistoryRecords().length) {
      const button = $("historyAction");
      if (!button) return;
      const hasQuery = Boolean(normalizeText($("historySearch")?.value));
      button.textContent = hasQuery ? "清除" : "清空历史";
      button.title = hasQuery ? "清除搜索内容" : "清空当前浏览器历史";
      button.classList.toggle("history-clear", !hasQuery);
      button.disabled = !hasQuery && recordCount === 0;
    }

    function renderHistory() {
      const list = $("historyList");
      const options = $("historyOptions");
      if (!list || !options) return;
      const query = $("historySearch")?.value || "";
      const records = combinedHistoryRecords();
      if ($("historyCount")) $("historyCount").textContent = String(records.length);
      updateHistoryActionButton(records.length);
      options.replaceChildren(...records.map((record) => {
        const option = document.createElement("option");
        option.value = historyDisplay(record);
        option.label = record.updatedAt ? new Date(record.updatedAt).toLocaleString() : "";
        return option;
      }));

      const visible = records.filter((record) => historyMatches(record, query));
      list.replaceChildren();
      if (!visible.length) {
        const empty = document.createElement("div");
        empty.className = "subtle";
        empty.textContent = query ? "没有匹配记录" : "暂无历史记录";
        list.appendChild(empty);
        return;
      }
      visible.forEach((record) => {
        const row = document.createElement("div");
        row.className = "history-row";
        const button = document.createElement("button");
        button.type = "button";
        button.className = "history-item";
        const title = document.createElement("strong");
        title.textContent = `${record.vvd} · ${record.lane || "-"}`;
        const meta = document.createElement("span");
        const dateText = record.updatedAt ? new Date(record.updatedAt).toLocaleString() : "";
        const actionText = record.source === "exported" ? "已导出" : "已查询";
        meta.textContent = `${record.vesselName || "-"} · ${actionText}${dateText ? ` · ${dateText}` : ""}`;
        button.appendChild(title);
        button.appendChild(meta);
        button.addEventListener("click", () => loadHistoryRecord(record));
        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "history-delete";
        deleteButton.textContent = "×";
        deleteButton.title = `删除 ${record.vvd}`;
        deleteButton.addEventListener("click", () => deleteHistoryRecord(record));
        row.appendChild(button);
        row.appendChild(deleteButton);
        list.appendChild(row);
      });
    }

    function loadHistoryRecord(record) {
      if (!record) {
        $("status").textContent = "没有可载入的历史记录";
        return;
      }
      $("vvd").value = record.vvd;
      $("serviceLane").value = record.lane || "";
      $("historySearch").value = historyDisplay(record);
      renderHistory();
      generateFromSchedule();
    }

    function recordTime(record) {
      const timestamp = Date.parse(record?.updatedAt || "");
      return Number.isFinite(timestamp) ? timestamp : 0;
    }

    function getSelectedWbPodKeys() {
      return [...$("wbPodOptions").querySelectorAll("input[type='checkbox']:checked")]
        .map((input) => input.value);
    }

    function buildCacheRecord() {
      const vvd = cleanVvd($("vvd").value);
      const selectedWbPodKeys = getSelectedWbPodKeys();
      const carriers = readCarrierRows();
      const primary = carriers[0] || defaultCarrier();
      return {
        vvd,
        lane: state.currentLookup?.lane || normalizeLane($("serviceLane").value),
        vesselName: $("vesselName").value.trim(),
        updatedAt: new Date().toISOString(),
        carriers,
        allocation: {
          wbTeus: primary.wbTeus,
          ebTeus: primary.ebTeus,
          tonPerTeu: primary.tonPerTeu,
          wbMt: primary.wbMt,
          ebMt: primary.ebMt,
          wbRf: primary.wbRf,
          ebRf: primary.ebRf
        },
        selectedWbPodKeys,
        selectedWbPodPorts: selectedWbPodKeys.map((key) => key.split("::")[0]).filter(Boolean)
      };
    }

    function saveLocalDraftForCurrentVvd() {
      if (state.applyingCache || !state.currentLookup) return;
      const record = buildCacheRecord();
      if (!record.vvd) return;
      saveLocalDraftRecord(record);
    }

    function setOptionalNumberInput(id, value, decimals = 0) {
      if (value === null || value === undefined || value === "") {
        $(id).value = "";
        return;
      }
      setNumberInput(id, value, decimals);
    }

    function applyCacheRecord(record) {
      if (!record) return;
      state.applyingCache = true;
      try {
        const allocation = record.allocation || {};
        const carriers = Array.isArray(record.carriers) && record.carriers.length
          ? record.carriers
          : [legacyCarrierFromAllocation(allocation)];
        renderCarrierRows(carriers);

        if (Array.isArray(record.selectedWbPodKeys)) {
          const selectedKeys = new Set(record.selectedWbPodKeys);
          const selectedPorts = new Set(record.selectedWbPodPorts || []);
          const inputs = [...$("wbPodOptions").querySelectorAll("input[type='checkbox']")];
          const hasExactMatch = inputs.some((input) => selectedKeys.has(input.value));
          inputs.forEach((input) => {
            const port = input.value.split("::")[0];
            input.checked = hasExactMatch ? selectedKeys.has(input.value) : selectedPorts.has(port);
          });
        }
        updateScheduleTextareasFromLookup();
      } finally {
        state.applyingCache = false;
      }
    }

    async function applySavedRecordForVvd(vvd) {
      const key = cleanVvd(vvd);
      if (!key) return "";
      let sharedRecord = null;
      try {
        const shared = await loadSharedCache();
        sharedRecord = shared.records[key] || null;
      } catch (error) {
        console.warn(error);
      }
      const localRecord = getLocalDrafts()[key] || null;
      const useLocal = localRecord && recordTime(localRecord) > recordTime(sharedRecord);
      const record = useLocal ? localRecord : sharedRecord;
      if (!record) return "";
      applyCacheRecord(record);
      return useLocal ? "已载入本机未同步草稿" : "已载入已同步数据";
    }

      state.currentLookup = null;
      state.lookupSignature = "";

      $("summaryLine").textContent = "Schedule preview";
      $("sheetWrap").replaceChildren();
      $("status").textContent = "已清除";
      refreshScheduleFieldOptions();
      renderHistory();
    }

    function getGithubToken() {
      try {
        return window.localStorage?.getItem(GITHUB_TOKEN_KEY) || "";
      } catch {
        return "";
      }
    }

    function setGithubToken(token) {
      try {
        if (token) window.localStorage?.setItem(GITHUB_TOKEN_KEY, token);
        else window.localStorage?.removeItem(GITHUB_TOKEN_KEY);
      } catch {
        // Ignore local storage failures; the user can paste the token again.
      }
      updateTokenUi();
    }

    function updateTokenUi() {
      const input = $("githubToken");
      if (!input) return;
      input.value = "";
      input.placeholder = getGithubToken() ? "已保存到本机浏览器" : "首次同步时填写";
    }

    function saveGithubTokenFromInput() {
      const token = $("githubToken").value.trim();
      if (!token) {
        $("status").textContent = "请先填写 GitHub Token";
        return "";
      }
      setGithubToken(token);
      $("status").textContent = "GitHub Token 已保存到本机浏览器";
      return token;
    }

    function githubHeaders(token) {
      return {
        Accept: "application/vnd.github+json",
        Authorization: `Bearer ${token}`,
        "X-GitHub-Api-Version": "2022-11-28"
      };
    }

    function encodeBase64Utf8(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary);
    }

    function decodeBase64Utf8(text) {
      const binary = atob(String(text || "").replace(/\s/g, ""));
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    async function githubErrorMessage(response) {
      try {
        const payload = await response.json();
        return payload.message || `${response.status} ${response.statusText}`;
      } catch {
        return `${response.status} ${response.statusText}`;
      }
    }

    async function readGithubCacheFile(token) {
      const response = await fetch(`${GITHUB_CACHE_API_URL}?ref=${encodeURIComponent(GITHUB_CACHE_BRANCH)}`, {
        headers: githubHeaders(token),
        cache: "no-store"
      });
      if (response.status === 404) return { cache: emptySharedCache(), sha: "" };
      if (!response.ok) throw new Error(await githubErrorMessage(response));
      const payload = await response.json();
      const content = payload.content ? decodeBase64Utf8(payload.content) : "{}";
      return {
        cache: normalizeSharedCache(parseJsonSafe(content, emptySharedCache())),
        sha: payload.sha || ""
      };
    }

    async function updateGithubCache(token, message, mutateCache) {
      for (let attempt = 0; attempt < 2; attempt += 1) {
        const current = await readGithubCacheFile(token);
        const cache = normalizeSharedCache(current.cache);
        mutateCache(cache);
        cache.updatedAt = new Date().toISOString();
        const body = {
          message,
          content: encodeBase64Utf8(`${JSON.stringify(cache, null, 2)}\n`),
          branch: GITHUB_CACHE_BRANCH
        };
        if (current.sha) body.sha = current.sha;
        const response = await fetch(GITHUB_CACHE_API_URL, {
          method: "PUT",
          headers: githubHeaders(token),
          body: JSON.stringify(body)
        });
        if (response.status === 409 && attempt === 0) continue;
        if (!response.ok) throw new Error(await githubErrorMessage(response));
        state.sharedCache = cache;
        return response.json();
      }
      throw new Error("GitHub cache conflict");
    }

    async function pushRecordToGithub(record, token) {
      return updateGithubCache(token, `Save space control cache ${record.vvd}`, (cache) => {
        cache.records[record.vvd] = record;
      });
    }

    function deleteHistoryRecord(record) {
      const vvd = cleanVvd(record?.vvd);
      if (!vvd) return;
      removeLocalHistoryRecord(record);
      if (historyMatches(record, $("historySearch").value)) $("historySearch").value = "";
      renderHistory();
      $("status").textContent = `已从本机历史删除 ${vvd}`;
    }

    function clearAllHistoryRecords() {
      const records = combinedHistoryRecords();
      if (!records.length) {
        $("status").textContent = "暂无历史记录";
        return;
      }
      if (!window.confirm("清空当前浏览器的全部历史记录？")) return;
      clearLocalHistoryRecords();
      $("historySearch").value = "";
      renderHistory();
      $("status").textContent = "本机历史记录已清空";
    }

    function handleHistoryAction() {
      if (normalizeText($("historySearch").value)) {
        $("historySearch").value = "";
        renderHistory();
        $("status").textContent = "历史搜索已清除";
        return;
      }
      clearAllHistoryRecords();
    }

    async function saveAndSyncCurrentVvd() {
      if (!state.currentLookup) {
        await generateFromSchedule();
        if (!state.currentLookup) return;
      }
      const record = buildCacheRecord();
      if (!record.vvd) {
        $("status").textContent = "请先输入 VVD";
        return;
      }
      saveLocalDraftRecord(record);
      const typedToken = $("githubToken").value.trim();
      if (typedToken) setGithubToken(typedToken);
      const token = getGithubToken();
      if (!token) {
        $("status").textContent = "已保存本机草稿；同步 GitHub 需要先填写 Token";
        return;
      }
      $("saveSync").disabled = true;
      $("status").textContent = "正在同步到 GitHub...";
      try {
        await pushRecordToGithub(record, token);
        clearLocalDraft(record.vvd);
        await loadSharedCache(true);
        $("status").textContent = `已保存并同步 ${record.vvd}`;
      } catch (error) {
        console.error(error);
        $("status").textContent = `同步失败：${error.message || error}`;
      } finally {
        $("saveSync").disabled = false;
      }
    }

    function rowsToText(rows) {
      return rows.map((row) => row.join(" ")).join("\n");
    }

    function normalizeText(value) {
      if (value === null || value === undefined) return "";
      return String(value).trim();
    }

    function normalizePort(port) {
      const value = normalizeText(port).toUpperCase();
      return PORT_ALIASES[value] || value;
    }

    function cleanVvd(value) {
      return normalizeText(value).replace(/[^A-Za-z0-9]/g, "").toUpperCase();
    }

    function normalizeLane(value) {
      return normalizeText(value).toUpperCase();
    }

    function parseDateValue(value) {
      if (value instanceof Date && !Number.isNaN(value.getTime())) return value;
      if (typeof value === "number" && Number.isFinite(value)) {
        const excelEpoch = Date.UTC(1899, 11, 30);
        return new Date(excelEpoch + value * 86400000);
      }
      const text = normalizeText(value);
      if (!text) return null;
      if (text.toUpperCase() === "SKIP") return null;
      const normalized = text.replace(/\//g, "-");
      const dateTime = normalized.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:[ T](\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
      if (dateTime) {
        return new Date(
          Number(dateTime[1]),
          Number(dateTime[2]) - 1,
          Number(dateTime[3]),
          Number(dateTime[4] || 0),
          Number(dateTime[5] || 0),
          Number(dateTime[6] || 0)
        );
      }
      const mmdd = normalized.match(/^(\d{1,2})-(\d{1,2})$/);
      if (mmdd) return new Date(2026, Number(mmdd[1]) - 1, Number(mmdd[2]));
      return null;
    }

    function formatMmDd(value) {
      const text = normalizeText(value);
      if (text.toUpperCase() === "SKIP") return "SKIP";
      const parsed = parseDateValue(value);
      if (!parsed) return text;
      const mm = String(parsed.getMonth() + 1).padStart(2, "0");
      const dd = String(parsed.getDate()).padStart(2, "0");
      return `${mm}/${dd}`;
    }

    function dateValueKey(value) {
      const text = normalizeText(value);
      if (!text || text.toUpperCase() === "SKIP") return "";
      const parsed = parseDateValue(value);
      if (!parsed) return text.toUpperCase();
      const year = parsed.getFullYear();
      const month = String(parsed.getMonth() + 1).padStart(2, "0");
      const day = String(parsed.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function podCallDate(pod) {
      return pod?.eta || pod?.etd || pod?.etb || "";
    }

    function blockCallDate(block) {
      return block?.etd || block?.eta || block?.etb || "";
    }

    function portOccurrenceCount(pods, port) {
      const target = normalizePort(port);
      return pods.filter((pod) => normalizePort(pod.port) === target).length;
    }

    function findPodIndexByCall(pods, target, options = {}) {
      const targetPort = normalizePort(target?.port);
      if (!targetPort) return -1;
      const candidates = pods
        .map((pod, index) => ({ pod, index }))
        .filter(({ pod }) => normalizePort(pod.port) === targetPort);
      if (!candidates.length) return -1;

      const targetDate = dateValueKey(podCallDate(target));
      if (targetDate) {
        const exact = candidates.find(({ pod }) => dateValueKey(podCallDate(pod)) === targetDate);
        if (exact) return exact.index;
        const hasDatedCandidate = candidates.some(({ pod }) => dateValueKey(podCallDate(pod)));
        if (hasDatedCandidate) return -1;
      }

      const targetPortCount = options.targetPortCount ?? 1;
      if (options.uniquePortFallback && candidates.length === 1 && targetPortCount === 1) {
        return candidates[0].index;
      }
      return -1;
    }

    function findDischargePodIndex(pods, block) {
      return findPodIndexByCall(
        pods,
        { port: block?.port, eta: blockCallDate(block) },
        { uniquePortFallback: true }
      );
    }

    function formatGeneratedDate(date = new Date()) {
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      return `${String(date.getDate()).padStart(2, "0")}-${months[date.getMonth()]}-${date.getFullYear()}`;
    }

    async function loadScheduleRows(force = false) {
      if (force) {
        if (state.scheduleRowsPromise) {
          try {
            await state.scheduleRowsPromise;
          } catch {
            // The forced refresh below will retry the download.
          }
        }
        state.scheduleRows = null;
        state.scheduleRowsPromise = null;
      }
      if (state.scheduleRows) return state.scheduleRows;
      if (state.scheduleRowsPromise) return state.scheduleRowsPromise;
      if (!window.XLSX) {
        throw new Error("Excel parser is not loaded. Check internet access to jsdelivr.net.");
      }

      state.scheduleRowsPromise = (async () => {
        const response = await fetch(SCHEDULE_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`Cannot read GitHub schedule (${response.status})`);
        const buffer = await response.arrayBuffer();
        const workbook = XLSX.read(new Uint8Array(buffer), { type: "array", cellDates: true });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const records = XLSX.utils.sheet_to_json(sheet, {
          defval: "",
          raw: false,
          dateNF: "yyyy-mm-dd hh:mm:ss"
        });

        const rows = records.map((record, index) => {
          const normalized = {};
          Object.entries(record).forEach(([key, value]) => {
            normalized[normalizeText(key).toUpperCase()] = value;
          });
          return {
            row: index + 2,
            lane: normalizeLane(normalized.LANE),
            vvd: cleanVvd(normalized.VVD),
            port: normalizePort(normalized.PORT),
            eta: normalizeText(normalized.ETA),
            etb: normalizeText(normalized.ETB),
            etd: normalizeText(normalized.ETD)
          };
        }).filter((row) => row.lane && row.vvd && row.port);

        const missing = ["LANE", "VVD", "PORT", "ETA", "ETB", "ETD"].filter((name) => {
          return !records.some((record) => Object.keys(record).some((key) => normalizeText(key).toUpperCase() === name));
        });
        if (missing.length) throw new Error(`Schedule is missing columns: ${missing.join(", ")}`);

        state.scheduleRows = rows;
        refreshScheduleFieldOptions();
        return rows;
      })();

      try {
        return await state.scheduleRowsPromise;
      } finally {
        state.scheduleRowsPromise = null;
      }
    }

    function rowMatchesLane(row, laneInput) {
      const lane = normalizeLane(laneInput);
      return !lane || row.lane === lane || row.lane.startsWith(lane) || lane.startsWith(`${row.lane}/`);
    }

    function rowMatchesVvdInput(row, vvdInput) {
      const vvd = cleanVvd(vvdInput);
      if (!vvd) return true;
      try {
        const current = currentDirectionVvds(vvd);
        const vvds = [current.w, current.e].filter(Boolean);
        if (vvds.length) return vvds.includes(row.vvd);
      } catch {
        // While the user is still typing, fall back to prefix matching.
      }
      return row.vvd.startsWith(vvd);
    }

    function makeVvdOptionValue(stem, dirs) {
      if (dirs.has("W") && dirs.has("E")) return `${stem}WE`;
      if (dirs.size === 1) return `${stem}${[...dirs][0]}`;
      return stem;
    }

    function populateLaneOptions(rows = state.scheduleRows, vvdInput = $("vvd")?.value || "") {
      const list = $("laneOptions");
      if (!list || !rows) return;
      const lanes = [...new Set(
        rows
          .filter((row) => rowMatchesVvdInput(row, vvdInput))
          .map((row) => row.lane)
      )].sort();
      list.replaceChildren(...lanes.map((lane) => {
        const option = document.createElement("option");
        option.value = lane;
        return option;
      }));
    }

    function populateVvdOptions(rows = state.scheduleRows, laneInput = $("serviceLane")?.value || "") {
      const list = $("vvdOptions");
      if (!list || !rows) return;
      const grouped = new Map();
      rows.filter((row) => rowMatchesLane(row, laneInput)).forEach((row) => {
        const match = row.vvd.match(/^([A-Z]+\d+)([WE])$/);
        const key = match ? match[1] : row.vvd;
        if (!grouped.has(key)) grouped.set(key, { lanes: new Set(), dirs: new Set() });
        grouped.get(key).lanes.add(row.lane);
        if (match) grouped.get(key).dirs.add(match[2]);
      });
      const options = [...grouped.entries()].map(([stem, info]) => {
        const value = makeVvdOptionValue(stem, info.dirs);
        return { value, label: [...info.lanes].sort().join("/") };
      }).sort((a, b) => a.label.localeCompare(b.label) || a.value.localeCompare(b.value));
      list.replaceChildren(...options.map((item) => {
        const option = document.createElement("option");
        option.value = item.value;
        option.label = item.label;
        return option;
      }));
    }

    function refreshScheduleFieldOptions() {
      if (!state.scheduleRows) return;
      populateLaneOptions(state.scheduleRows, $("vvd")?.value || "");
      populateVvdOptions(state.scheduleRows, $("serviceLane")?.value || "");
    }

    function hasConcreteVvdDirection(vvdInput) {
      try {
        const current = currentDirectionVvds(vvdInput);
        return Boolean(current.w || current.e);
      } catch {
        return false;
      }
    }

    async function syncLaneFromVvd() {
      const vvd = $("vvd")?.value || "";
      const rows = await loadScheduleRows();
      const lanes = [...new Set(
        rows
          .filter((row) => rowMatchesVvdInput(row, vvd))
          .map((row) => row.lane)
      )].sort();
      populateLaneOptions(rows, vvd);
      if (lanes.length === 1) $("serviceLane").value = lanes[0];
      else if (
        hasConcreteVvdDirection(vvd)
        && normalizeLane($("serviceLane").value)
        && !lanes.some((lane) => rowMatchesLane({ lane }, $("serviceLane").value))
      ) {
        $("serviceLane").value = "";
      }
      populateVvdOptions(rows, $("serviceLane")?.value || "");
    }

    async function loadVesselMapping() {
      if (state.vesselMapping) return state.vesselMapping;
      const mapping = {};
      for (const url of [LOCAL_MAPPING_URL, REMOTE_MAPPING_URL]) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) continue;
          const csv = await response.text();
          csv.split(/\r?\n/).slice(1).forEach((line) => {
            if (!line.trim()) return;
            const [code, name, active] = line.split(",").map((part) => normalizeText(part));
            if (code && name && !["N", "NO", "FALSE", "0", "INACTIVE"].includes(active.toUpperCase())) {
              mapping[code.toUpperCase()] = name.toUpperCase();
            }
          });
          break;
        } catch {
          // Try the next mapping source.
        }
      }
      state.vesselMapping = mapping;
      return mapping;
    }

    function vvdParts(vvd) {
      const match = cleanVvd(vvd).match(/^([A-Z]+)(\d+)([A-Z]+)$/);
      if (!match) throw new Error(`Cannot parse VVD: ${vvd}`);
      return { code: match[1], cycle: match[2], suffix: match[3] };
    }

    function currentDirectionVvds(vvd) {
      const { code, cycle, suffix } = vvdParts(vvd);
      const stem = `${code}${cycle}`;
      if (suffix === "WE" || suffix === "EW") return { w: `${stem}W`, e: `${stem}E` };
      if (suffix === "W") return { w: `${stem}W`, e: null };
      if (suffix === "E") return { w: null, e: `${stem}E` };
      return {
        w: suffix.includes("W") ? `${stem}W` : null,
        e: suffix.includes("E") ? `${stem}E` : null
      };
    }

    function inferLane(rows, vvds) {
      const lanes = rows
        .filter((row) => vvds.includes(row.vvd))
        .map((row) => row.lane);
      const unique = [...new Set(lanes)].sort();
      if (unique.length !== 1) {
        throw new Error(`Cannot infer one lane for VVD. Candidates: ${unique.join(", ") || "none"}`);
      }
      return unique[0];
    }

    function resolveLane(rows, vvds, laneInput) {
      const lane = normalizeLane(laneInput);
      if (!lane) return inferLane(rows, vvds);
      const candidates = [...new Set(
        rows
          .filter((row) => vvds.includes(row.vvd) && rowMatchesLane(row, lane))
          .map((row) => row.lane)
      )].sort();
      if (candidates.length === 1) return candidates[0];
      throw new Error(`Cannot resolve lane for VVD. Candidates: ${candidates.join(", ") || "none"}`);
    }

    function findCalls(rows, vvd, lane) {
      if (!vvd) return [];
      return rows
        .filter((row) => row.vvd === vvd && row.lane === lane)
        .sort((a, b) => a.row - b.row);
    }

    function firstTime(calls) {
      if (!calls.length) return null;
      return parseDateValue(calls[0].eta) || parseDateValue(calls[0].etb) || parseDateValue(calls[0].etd);
    }

    function findNextW(rows, lane, currentECalls, vesselCode) {
      if (!currentECalls.length) return [];
      const lastEPort = currentECalls[currentECalls.length - 1].port;
      const boundary = parseDateValue(currentECalls[currentECalls.length - 1].eta) || firstTime(currentECalls);
      const grouped = new Map();
      rows
        .filter((row) => row.lane === lane && row.vvd.startsWith(vesselCode) && row.vvd.endsWith("W"))
        .forEach((row) => {
          if (!grouped.has(row.vvd)) grouped.set(row.vvd, []);
          grouped.get(row.vvd).push(row);
        });

      const candidates = [];
      grouped.forEach((calls, vvd) => {
        calls.sort((a, b) => a.row - b.row);
        if (!calls.length || calls[0].port !== lastEPort) return;
        const start = firstTime(calls);
        if (!start) return;
        if (boundary && start < boundary) return;
        candidates.push({ start, vvd, calls });
      });
      candidates.sort((a, b) => a.start - b.start || a.vvd.localeCompare(b.vvd));
      return candidates[0]?.calls || [];
    }

    function appendConsecutiveDedup(route, calls) {
      calls.forEach((call) => {
        if (route.length && route[route.length - 1].port === call.port) return;
        route.push(call);
      });
    }

    function callDateKey(call) {
      return call?.etd || call?.eta || call?.etb || "";
    }

    function dedupeCallsByPortDate(calls) {
      const seen = new Set();
      const result = [];
      calls.forEach((call) => {
        if (!call?.port) return;
        const key = `${call.port}::${callDateKey(call)}`;
        if (seen.has(key)) return;
        seen.add(key);
        result.push(call);
      });
      return result;
    }

    function trimClosingReturnCall(calls, firstPort) {
      if (!calls.length || !firstPort) return calls;
      const last = calls[calls.length - 1];
      return last.port === firstPort ? calls.slice(0, -1) : calls;
    }

    function vesselNameForVvd(vvd, mapping) {
      const clean = cleanVvd(vvd);
      const codes = Object.keys(mapping).sort((a, b) => b.length - a.length);
      const code = codes.find((candidate) => clean.startsWith(candidate)) || vvdParts(vvd).code;
      return { code, name: mapping[code] || code };
    }

    async function lookupSchedule(vvd, laneInput = "", forceSchedule = false) {
      const [rows, mapping] = await Promise.all([loadScheduleRows(forceSchedule), loadVesselMapping()]);
      const current = currentDirectionVvds(vvd);
      const vvds = [current.w, current.e].filter(Boolean);
      const lane = resolveLane(rows, vvds, laneInput);
      const vessel = vesselNameForVvd(vvd, mapping);
      const wbCalls = findCalls(rows, current.w, lane);
      const ebCalls = findCalls(rows, current.e, lane);
      const nextWCalls = findNextW(rows, lane, ebCalls, vessel.code);
      const nextEVvd = nextWCalls.length ? `${nextWCalls[0].vvd.slice(0, -1)}E` : null;
      const nextECalls = findCalls(rows, nextEVvd, lane);
      const ebRouteCalls = [];
      appendConsecutiveDedup(ebRouteCalls, ebCalls);
      appendConsecutiveDedup(ebRouteCalls, nextWCalls);

      return {
        inputVvd: cleanVvd(vvd),
        lane,
        vesselCode: vessel.code,
        vesselName: vessel.name,
        currentWVvd: current.w,
        currentEVvd: current.e,
        nextWVvd: nextWCalls[0]?.vvd || "",
        nextEVvd: nextECalls[0]?.vvd || "",
        wbCalls,
        ebCalls,
        ebRouteCalls
      };
    }

    function callsToPodRows(calls) {
      return calls.map((call) => [call.port, formatMmDd(call.etd)]);
    }

    function callsToPolRows(calls) {
      return calls.map((call) => [call.port, formatMmDd(call.etb), formatMmDd(call.etd)]);
    }

    function lookupSignature(lookup) {
      return [
        lookup.inputVvd,
        lookup.lane,
        lookup.currentWVvd,
        lookup.currentEVvd,
        lookup.nextWVvd,
        lookup.nextEVvd,
        lookup.wbCalls.map((call) => `${call.vvd}:${call.port}:${call.etd}`).join("|"),
        lookup.ebRouteCalls.map((call) => `${call.vvd}:${call.port}:${call.etd}`).join("|")
      ].join("::");
    }

    function podOptionKey(call) {
      return `${call.port}::${callDateKey(call)}`;
    }

    function selectedWbPodCalls(lookup) {
      const checked = new Set(
        [...$("wbPodOptions").querySelectorAll("input[type='checkbox']:checked")].map((input) => input.value)
      );
      return lookup.wbCalls.filter((call) => checked.has(podOptionKey(call)));
    }

    function updateScheduleTextareasFromLookup() {
      const lookup = state.currentLookup;
      if (!lookup) return;
      const wbPodCalls = dedupeCallsByPortDate([...selectedWbPodCalls(lookup), ...lookup.ebCalls]);
      $("wbPods").value = rowsToText(callsToPodRows(wbPodCalls));
      $("wbPols").value = rowsToText(callsToPolRows(lookup.wbCalls));
      $("ebPods").value = rowsToText(callsToPodRows(lookup.ebRouteCalls));
      $("ebPols").value = rowsToText(callsToPolRows(lookup.ebCalls));
    }

    function renderWbPodOptions(lookup) {
      const container = $("wbPodOptions");
      container.replaceChildren();
      lookup.wbCalls.forEach((call) => {
        const label = document.createElement("label");
        label.className = "port-option";
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = podOptionKey(call);
        checkbox.checked = true;
        checkbox.addEventListener("change", () => {
          updateScheduleTextareasFromLookup();
          render();
          saveLocalDraftForCurrentVvd();
        });
        const text = document.createElement("span");
        text.textContent = `${call.port} ${formatMmDd(call.etd)}`;
        label.appendChild(checkbox);
        label.appendChild(text);
        container.appendChild(label);
      });
    }

    function applyLookup(lookup) {
      const signature = lookupSignature(lookup);
      if (state.lookupSignature && state.lookupSignature !== signature) {
        state.entries = { WB: {}, EB: {} };
      }
      state.lookupSignature = signature;
      state.currentLookup = lookup;
      $("serviceLane").value = lookup.lane;
      refreshScheduleFieldOptions();
      $("vesselName").value = lookup.vesselName;
      $("reportDate").value = formatGeneratedDate();
      $("selection").value = "";
      renderWbPodOptions(lookup);
      updateScheduleTextareasFromLookup();
      $("scheduleSummary").textContent =
        `${lookup.vesselName} / ${lookup.inputVvd} · ${lookup.lane} · ` +
        `WB ${lookup.currentWVvd || "-"} (${lookup.wbCalls.length} calls), ` +
        `EB ${lookup.currentEVvd || "-"} + ${lookup.nextWVvd || "-"} + ${lookup.nextEVvd || "-"} (${lookup.ebRouteCalls.length} calls)`;
      setCompactScheduleSummary(lookup);
    }

    function setCompactScheduleSummary(lookup) {
      $("scheduleSummary").textContent =
        `${lookup.vesselName} / ${lookup.inputVvd} · ${lookup.lane} · ` +
        `WB ${lookup.currentWVvd || "-"} (${lookup.wbCalls.length} calls), ` +
        `EB ${lookup.currentEVvd || "-"} (${lookup.ebCalls.length} calls)`;
    }

    async function generateFromSchedule(options = {}) {
      const vvd = cleanVvd($("vvd").value);
      if (!vvd) {
        $("status").textContent = "请输入 VVD";
        return;
      }
      const lane = normalizeLane($("serviceLane").value);
      $("vvd").value = vvd;
      $("serviceLane").value = lane;
      const forceSchedule = options?.forceSchedule === true;
      $("status").textContent = forceSchedule ? "正在重新下载 GitHub 船期..." : "正在读取船期...";
      $("generate").disabled = true;
      try {
        const lookup = await lookupSchedule(vvd, lane, forceSchedule);
        applyLookup(lookup);
        const cacheMessage = await applySavedRecordForVvd(lookup.inputVvd);
        render();
        saveHistoryRecord({
          vvd: lookup.inputVvd,
          lane: lookup.lane,
          vesselName: lookup.vesselName,
          updatedAt: new Date().toISOString()
        }, "generated");
        $("status").textContent = cacheMessage
          ? `${forceSchedule ? "GitHub 船期已更新" : "船期已读取"} · ${lookup.lane} · ${cacheMessage}`
          : `${forceSchedule ? "GitHub 船期已更新" : "船期已读取"} · ${lookup.lane}`;
      } catch (error) {
        console.error(error);
        $("status").textContent = "船期读取失败";
        $("scheduleSummary").textContent = error.message || String(error);
      } finally {
        $("generate").disabled = false;
      }
    }

    function textToRows(text, fieldCount) {
      return text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => line.split(/[\s,，\t]+/).filter(Boolean).slice(0, fieldCount))
        .filter((parts) => parts.length >= 1)
        .map((parts) => {
          while (parts.length < fieldCount) parts.push("");
          return parts;
        });
    }

    function setSample() {
      $("vesselName").value = sample.vesselName;
      $("vvd").value = sample.vvd;
      $("serviceLane").value = sample.serviceLane;
      $("reportDate").value = sample.reportDate;
      $("selection").value = sample.selection;
      $("tonPerTeu").value = sample.tonPerTeu;
      $("wbTeus").value = sample.wbTeus;
      $("wbMt").value = sample.wbMt;
      $("wbRf").value = sample.wbRf;
      $("ebTeus").value = sample.ebTeus;
      $("ebMt").value = sample.ebMt;
      $("ebRf").value = sample.ebRf;
      renderCarrierRows(sample.carriers || [legacyCarrierFromAllocation(sample)]);
      $("wbPods").value = rowsToText(sample.wbPods);
      $("wbPols").value = rowsToText(sample.wbPols);
      $("ebPods").value = rowsToText(sample.ebPods);
      $("ebPols").value = rowsToText(sample.ebPols);
    }

    function numberValue(id) {
      const value = Number($(id).value);
      return Number.isFinite(value) ? value : 0;
    }

    function integerValue(id) {
      return Math.round(numberValue(id));
    }

    function inputNumberOrNull(id) {
      const text = $(id).value.trim();
      if (!text) return null;
      const value = Number(text);
      return Number.isFinite(value) ? value : null;
    }

    function formatInputNumber(value, decimals = 0) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "";
      if (decimals <= 0) return String(Math.round(numeric));
      return numeric.toFixed(decimals).replace(/\.?0+$/, "");
    }

    function setNumberInput(id, value, decimals = 0) {
      const text = formatInputNumber(value, decimals);
      if (text !== "") $(id).value = text;
    }

    function blankNumberToNull(value) {
      const text = normalizeText(value);
      if (!text) return null;
      const numeric = Number(text);
      return Number.isFinite(numeric) ? numeric : null;
    }

    function carrierCode(value, fallback = DEFAULT_CARRIER_CODE) {
      const code = normalizeText(value).replace(/[^A-Za-z0-9_-]/g, "").toUpperCase();
      return code || fallback;
    }

    function defaultCarrier(code = DEFAULT_CARRIER_CODE) {
      return {
        code: normalizeText(code) ? carrierCode(code, "") : "",
        tonPerTeu: DEFAULT_TON_PER_TEU,
        wbTeus: null,
        wbMt: null,
        wbRf: null,
        ebTeus: null,
        ebMt: null,
        ebRf: null
      };
    }

    function normalizeCarrier(record = {}, index = 0) {
      const fallback = index === 0 ? DEFAULT_CARRIER_CODE : "";
      const ton = blankNumberToNull(record.tonPerTeu);
      return {
        code: carrierCode(record.code, fallback),
        tonPerTeu: ton === null ? DEFAULT_TON_PER_TEU : ton,
        wbTeus: blankNumberToNull(record.wbTeus),
        wbMt: blankNumberToNull(record.wbMt),
        wbRf: blankNumberToNull(record.wbRf),
        ebTeus: blankNumberToNull(record.ebTeus),
        ebMt: blankNumberToNull(record.ebMt),
        ebRf: blankNumberToNull(record.ebRf)
      };
    }

    function legacyCarrierFromAllocation(allocation = {}) {
      return normalizeCarrier({
        code: DEFAULT_CARRIER_CODE,
        tonPerTeu: allocation.tonPerTeu ?? inputNumberOrNull("tonPerTeu") ?? DEFAULT_TON_PER_TEU,
        wbTeus: allocation.wbTeus,
        wbMt: allocation.wbMt,
        wbRf: allocation.wbRf,
        ebTeus: allocation.ebTeus,
        ebMt: allocation.ebMt,
        ebRf: allocation.ebRf
      });
    }

    function uniqueCarriers(carriers) {
      const seen = new Map();
      return carriers.map((carrier, index) => {
        const normalized = normalizeCarrier(carrier, index);
        if (!normalized.code) return normalized;
        const base = normalized.code;
        const count = seen.get(base) || 0;
        seen.set(base, count + 1);
        return { ...normalized, code: count ? `${base}${count + 1}` : base };
      });
    }

    function activeCarriers(carriers) {
      const named = uniqueCarriers(carriers || []).filter((carrier) => normalizeText(carrier.code));
      return named.length ? named : [defaultCarrier()];
    }

    function readCarrierRows() {
      const rows = [...($("carrierRows")?.querySelectorAll("[data-carrier-row]") || [])];
      const carriers = rows.map((row, index) => {
        const value = (field) => row.querySelector(`[data-field="${field}"]`)?.value;
        return normalizeCarrier({
          code: value("code"),
          wbTeus: value("wbTeus"),
          ebTeus: value("ebTeus"),
          tonPerTeu: value("tonPerTeu"),
          wbMt: value("wbMt"),
          ebMt: value("ebMt"),
          wbRf: value("wbRf"),
          ebRf: value("ebRf")
        }, index);
      });
      return uniqueCarriers(carriers.length ? carriers : [defaultCarrier()]);
    }

    function carrierAllocation(carrier, direction) {
      const prefix = direction.toLowerCase();
      return {
        teus: Math.round(Number(carrier[`${prefix}Teus`]) || 0),
        mt: Math.round(Number(carrier[`${prefix}Mt`]) || 0),
        rf: Math.round(Number(carrier[`${prefix}Rf`]) || 0)
      };
    }

    function totalCarrierAllocation(carriers, direction) {
      return carriers.reduce((total, carrier) => {
        const allocation = carrierAllocation(carrier, direction);
        total.teus += allocation.teus;
        total.mt += allocation.mt;
        total.rf += allocation.rf;
        return total;
      }, { teus: 0, mt: 0, rf: 0 });
    }

    function writeCarrierNumber(input, value, decimals = 0) {
      const text = formatInputNumber(value, decimals);
      input.value = text;
    }

    function carrierInputText(value, decimals = 0) {
      if (value === null || value === undefined || value === "") return "";
      return formatInputNumber(value, decimals);
    }

    function createCarrierInput(field, value, type = "number") {
      const input = document.createElement("input");
      input.dataset.field = field;
      input.value = value ?? "";
      if (type === "number") {
        input.type = "number";
        input.min = "0";
        input.step = field === "tonPerTeu" ? "0.01" : "1";
      } else {
        input.type = "text";
        input.maxLength = 12;
      }
      return input;
    }

    function createPartnerField(label, field, value, type = "number") {
      const wrapper = document.createElement("label");
      wrapper.className = "partner-field";
      appendText(wrapper, "span", label);
      wrapper.appendChild(createCarrierInput(field, value, type));
      return wrapper;
    }

    function createPartnerAction(action, text, className, title) {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = text;
      button.dataset.action = action;
      button.className = className;
      button.title = title;
      return button;
    }

    function renderCarrierRows(carriers = [defaultCarrier()]) {
      const body = $("carrierRows");
      if (!body) return;
      const normalized = uniqueCarriers(carriers.length ? carriers : [defaultCarrier()]);
      body.replaceChildren();
      normalized.forEach((carrier) => {
        const row = document.createElement("div");
        row.className = "partner-row";
        row.dataset.carrierRow = "1";
        row.appendChild(createPartnerField("Partner", "code", carrier.code, "text"));
        row.appendChild(createPartnerField("Ton/TEU", "tonPerTeu", carrierInputText(carrier.tonPerTeu, 4)));
        row.appendChild(createPartnerField("WB TEU", "wbTeus", carrierInputText(carrier.wbTeus, 0)));
        row.appendChild(createPartnerField("WB Weight", "wbMt", carrierInputText(carrier.wbMt, 0)));
        row.appendChild(createPartnerField("WB RF", "wbRf", carrierInputText(carrier.wbRf, 0)));
        row.appendChild(createPartnerAction("syncAll", "=", "mini-sync", "将 WB TEU、Weight、RF 全部同步到 EB"));
        row.appendChild(createPartnerField("EB TEU", "ebTeus", carrierInputText(carrier.ebTeus, 0)));
        row.appendChild(createPartnerField("EB Weight", "ebMt", carrierInputText(carrier.ebMt, 0)));
        row.appendChild(createPartnerField("EB RF", "ebRf", carrierInputText(carrier.ebRf, 0)));
        row.appendChild(createPartnerAction("remove", "×", "remove-carrier", `删除 ${carrier.code || "Partner"}`));
        body.appendChild(row);
      });
      syncLegacyInputsFromCarriers();
    }

    function syncLegacyInputsFromCarriers() {
      const carriers = readCarrierRows();
      const first = carriers[0] || defaultCarrier();
      setOptionalNumberInput("wbTeus", first.wbTeus, 0);
      setOptionalNumberInput("ebTeus", first.ebTeus, 0);
      setOptionalNumberInput("tonPerTeu", first.tonPerTeu, 4);
      setOptionalNumberInput("wbMt", first.wbMt, 0);
      setOptionalNumberInput("ebMt", first.ebMt, 0);
      setOptionalNumberInput("wbRf", first.wbRf, 0);
      setOptionalNumberInput("ebRf", first.ebRf, 0);
    }

    function updateCarrierWeights(row) {
      const ratio = blankNumberToNull(row.querySelector('[data-field="tonPerTeu"]')?.value) ?? DEFAULT_TON_PER_TEU;
      [["wbTeus", "wbMt"], ["ebTeus", "ebMt"]].forEach(([teuField, mtField]) => {
        const teu = blankNumberToNull(row.querySelector(`[data-field="${teuField}"]`)?.value);
        const mtInput = row.querySelector(`[data-field="${mtField}"]`);
        if (!mtInput) return;
        if (teu === null) mtInput.value = "";
        else writeCarrierNumber(mtInput, teu * ratio, 0);
      });
    }

    function updateCarrierRatioFromWeight(row, mtField, teuField) {
      const mt = blankNumberToNull(row.querySelector(`[data-field="${mtField}"]`)?.value);
      const teu = blankNumberToNull(row.querySelector(`[data-field="${teuField}"]`)?.value);
      const ratioInput = row.querySelector('[data-field="tonPerTeu"]');
      if (mt !== null && teu !== null && teu > 0 && ratioInput) {
        writeCarrierNumber(ratioInput, mt / teu, 4);
        updateCarrierWeights(row);
      }
    }

    function syncCarrierPair(row, leftField, rightField) {
      const leftInput = row.querySelector(`[data-field="${leftField}"]`);
      const rightInput = row.querySelector(`[data-field="${rightField}"]`);
      if (!leftInput || !rightInput) return;
      const left = blankNumberToNull(leftInput.value);
      const right = blankNumberToNull(rightInput.value);
      if (left !== null) writeCarrierNumber(rightInput, left, 0);
      else if (right !== null) writeCarrierNumber(leftInput, right, 0);
    }

    function syncCarrierToEb(row) {
      [["wbTeus", "ebTeus"], ["wbMt", "ebMt"], ["wbRf", "ebRf"]].forEach(([wbField, ebField]) => {
        const wbInput = row.querySelector(`[data-field="${wbField}"]`);
        const ebInput = row.querySelector(`[data-field="${ebField}"]`);
        if (!wbInput || !ebInput) return;
        const value = blankNumberToNull(wbInput.value);
        if (value === null) ebInput.value = "";
        else writeCarrierNumber(ebInput, value, 0);
      });
    }

    function tonPerTeuValue() {
      const value = inputNumberOrNull("tonPerTeu");
      if (value === null) {
        setNumberInput("tonPerTeu", 14, 0);
        return 14;
      }
      return value;
    }

    function syncBsaWeightsFromTeu() {
      const ratio = tonPerTeuValue();
      [
        ["wbTeus", "wbMt"],
        ["ebTeus", "ebMt"]
      ].forEach(([teuId, weightId]) => {
        const teus = inputNumberOrNull(teuId);
        if (teus === null) {
          $(weightId).value = "";
          return;
        }
        setNumberInput(weightId, teus * ratio, 0);
      });
    }

    function syncPairedInput(sourceId, targetId) {
      const sourceValue = inputNumberOrNull(sourceId);
      if (sourceValue === null) return;
      setNumberInput(targetId, sourceValue, 0);
    }

    function syncLastEditedPair(kind, wbId, ebId) {
      const sourceId = syncSource[kind] || wbId;
      const targetId = sourceId === wbId ? ebId : wbId;
      const sourceValue = inputNumberOrNull(sourceId);
      if (sourceValue !== null) {
        setNumberInput(targetId, sourceValue, 0);
        return;
      }
      const targetValue = inputNumberOrNull(targetId);
      if (targetValue !== null) {
        setNumberInput(sourceId, targetValue, 0);
      }
    }

    function syncTeuPair() {
      syncLastEditedPair("teus", "wbTeus", "ebTeus");
      syncBsaWeightsFromTeu();
      rerenderIfScheduleReady();
    }

    function syncRfPair() {
      syncLastEditedPair("rf", "wbRf", "ebRf");
      rerenderIfScheduleReady();
    }

    function handleTeuInput(sourceId) {
      syncSource.teus = sourceId;
      syncBsaWeightsFromTeu();
      rerenderIfScheduleReady();
    }

    function handleRfInput(sourceId) {
      syncSource.rf = sourceId;
      rerenderIfScheduleReady();
    }

    function handleWeightInput(weightId, teuId) {
      const weight = inputNumberOrNull(weightId);
      const teus = inputNumberOrNull(teuId);
      if (weight !== null && teus !== null && teus > 0) {
        setNumberInput("tonPerTeu", weight / teus, 4);
        syncBsaWeightsFromTeu();
      } else if (weight !== null) {
        setNumberInput(weightId, weight, 0);
      }
      rerenderIfScheduleReady();
    }

    function handleTonPerTeuInput() {
      syncBsaWeightsFromTeu();
      rerenderIfScheduleReady();
    }

    function readInputs() {
      const carriers = activeCarriers(readCarrierRows());
      syncLegacyInputsFromCarriers();
      const wbAlloc = totalCarrierAllocation(carriers, "WB");
      const ebAlloc = totalCarrierAllocation(carriers, "EB");
      return {
        vesselName: $("vesselName").value.trim() || "VESSEL",
        vvd: $("vvd").value.trim().toUpperCase() || "VVD",
        serviceLane: $("serviceLane").value.trim() || "",
        reportDate: $("reportDate").value.trim() || "",
        selection: $("selection").value.trim() || "",
        tonPerTeu: carriers[0]?.tonPerTeu ?? DEFAULT_TON_PER_TEU,
        carriers,
        WB: {
          allocationLabel: carriers.length > 1 ? "WB TOTAL" : "WB ALLOCATION",
          allocation: wbAlloc,
          pods: textToRows($("wbPods").value, 2).map(([port, eta]) => ({ port: port.toUpperCase(), eta })),
          pols: textToRows($("wbPols").value, 3).map(([port, etb, etd]) => ({ port: port.toUpperCase(), etb, etd }))
        },
        EB: {
          allocationLabel: carriers.length > 1 ? "EB TOTAL" : "EB ALLOCATION",
          allocation: ebAlloc,
          pods: textToRows($("ebPods").value, 2).map(([port, eta]) => ({ port: port.toUpperCase(), eta })),
          pols: textToRows($("ebPols").value, 3).map(([port, etb, etd]) => ({ port: port.toUpperCase(), etb, etd }))
        }
      };
    }

    function makeTableModel(input, sheetName) {
      const sheet = input[sheetName];
      const blocks = [
        { key: "ROB", port: "ROB", etb: "", etd: "", type: "ROB" },
        ...sheet.pols.map((pol, index) => ({ ...pol, key: `${pol.port}-${index}`, type: "POL" })),
        { key: "TOTAL", port: "TOTAL", etb: "", etd: "", type: "TOTAL" }
      ];

      const podTotals = sheet.pods.map(() => ({
        cargo20: Array(6).fill(0),
        cargo40: Array(6).fill(0),
        weight: 0
      }));

      const blockRows = blocks.map((block) => cargoLabels.map((label, offset) => ({
        block,
        label,
        offset,
        cells: sheet.pods.map(() => ({ left: "", right: "" })),
        totals: { left: 0, right: 0, teus: 0 },
        rob: { all: "", ld: "", utilAll: "", utilLd: "", avlTeu: "", avlWeight: "", rf: "" }
      })));

      return {
        meta: input,
        sheetName,
        sheet,
        blocks,
        rows: blockRows,
        podTotals
      };
    }

    function cellText(value, decimals = 0) {
      if (value === "" || value === null || value === undefined) return "";
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return String(value);
      if (Math.abs(numeric) < 0.000001) return "";
      return numeric.toLocaleString("en-US", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    function percentText(value) {
      if (value === "" || value === null || value === undefined) return "";
      const numeric = Number(value);
      if (!Number.isFinite(numeric) || numeric === 0) return "";
      return `${Math.round(numeric * 100)}%`;
    }

    function parseCellNumber(text) {
      const value = Number(String(text || "").replace(/,/g, "").trim());
      return Number.isFinite(value) ? value : 0;
    }

    function entryKey(block, row, pod, side) {
      return `${block}|${row}|${pod}|${side}`;
    }

    function saveCellEntry(cell, sheetName) {
      if (!cell?.dataset) return;
      const { block, row, pod, side } = cell.dataset;
      if (block === undefined || row === undefined || pod === undefined || !side) return;
      const key = entryKey(block, row, pod, side);
      const value = normalizeText(cell.textContent);
      if (!state.entries[sheetName]) state.entries[sheetName] = {};
      if (value) state.entries[sheetName][key] = value;
      else delete state.entries[sheetName][key];
    }

    function saveEntriesFromCurrentTable() {
      const table = activeTable();
      if (!table) return;
      const sheetName = table.dataset.sheet || state.activeSheet;
      table.querySelectorAll(".editable[data-block][data-row][data-pod][data-side]").forEach((cell) => {
        saveCellEntry(cell, sheetName);
      });
    }

    function applyEntriesToTable(table, sheetName) {
      const entries = state.entries[sheetName] || {};
      Object.entries(entries).forEach(([key, value]) => {
        const [block, row, pod, side] = key.split("|");
        const cell = table.querySelector(
          `[data-block="${block}"][data-row="${row}"][data-pod="${pod}"][data-side="${side}"]`
        );
        if (cell && cell.classList.contains("editable")) {
          cell.textContent = value;
        }
      });
    }

    function buildTable(model) {
      const podColspan = model.sheet.pods.length * 2;
      const totalCols = 3 + podColspan + 10;
      const table = document.createElement("table");
      table.className = "space-table";
      table.dataset.sheet = model.sheetName;

      const colgroup = document.createElement("colgroup");
      const widths = [
        "fixed-left",
        "fixed-mid",
        "label",
        ...model.sheet.pods.flatMap(() => ["pod-col", "pod-col"]),
        ...Array(10).fill("sum-col")

        const col = document.createElement("col");
        col.className = className;
        colgroup.appendChild(col);
      });
      table.appendChild(colgroup);

      addCell(infoRow, `Service Lane : ${model.meta.serviceLane}`, { colspan: 3, tag: "th" });

      addCell(infoRow, cellText(model.sheet.allocation.teus), { colspan: 1, tag: "th", className: "alloc-input", dataset: { alloc: "teus" } });
      addCell(infoRow, "TEUS", { colspan: 1, tag: "th" });
      addCell(infoRow, cellText(model.sheet.allocation.mt), { colspan: 1, tag: "th", className: "alloc-input", dataset: { alloc: "mt" } });
      addCell(infoRow, "MT", { colspan: 1, tag: "th" });
