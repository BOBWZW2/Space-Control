      addCell(infoRow, cellText(model.sheet.allocation.rf), { colspan: 1, tag: "th", className: "alloc-input", dataset: { alloc: "rf" } });
      addCell(infoRow, "RF PLUGS", { colspan: 4, tag: "th" });

      const headerA = addRow(tbody, "header");
      addCell(headerA, "", { rowspan: 3, tag: "th" });
      addCell(headerA, "POD", { colspan: 2, tag: "th" });
      model.sheet.pods.forEach((pod) => {
        const className = String(pod.eta).toUpperCase() === "SKIP" ? "skip" : "";
        addCell(headerA, pod.port, { colspan: 2, tag: "th", className });
      });
      addCell(headerA, "TOTAL", { colspan: 2, tag: "th" });
      addCell(headerA, "TTL", { rowspan: 2, tag: "th" });
      addCell(headerA, "ROB (TEUS)", { colspan: 2, tag: "th" });
      addCell(headerA, "UTILISATION", { colspan: 2, tag: "th" });
      addCell(headerA, "AVL", { colspan: 2, tag: "th" });
      addCell(headerA, "RF Plug", { rowspan: 2, tag: "th" });

      const headerB = addRow(tbody, "header");
      addCell(headerB, "ETA", { colspan: 2, tag: "th" });
      model.sheet.pods.forEach((pod) => {
        const className = String(pod.eta).toUpperCase() === "SKIP" ? "skip" : "";
        addCell(headerB, pod.eta, { colspan: 2, tag: "th", className });
      });
      addCell(headerB, "", { colspan: 2, tag: "th" });
      addCell(headerB, "", { colspan: 2, tag: "th" });
      addCell(headerB, "", { colspan: 2, tag: "th" });
      addCell(headerB, "", { colspan: 2, tag: "th" });

      const headerC = addRow(tbody, "header block-end");
      addCell(headerC, "POL", { colspan: 2, tag: "th" });
      model.sheet.pods.forEach(() => {
        addCell(headerC, "20'", { tag: "th" });
        addCell(headerC, "40'", { tag: "th" });
      });
      addCell(headerC, "20'", { tag: "th" });
      addCell(headerC, "40'", { tag: "th" });
      addCell(headerC, "TEUS", { tag: "th" });
      addCell(headerC, "(All)", { tag: "th" });
      addCell(headerC, "(LD)", { tag: "th" });
      addCell(headerC, "(All)", { tag: "th" });
      addCell(headerC, "(LD)", { tag: "th" });
      addCell(headerC, "TEUs", { tag: "th" });
      addCell(headerC, "Weight", { tag: "th" });
      addCell(headerC, "", { tag: "th" });

      model.rows.forEach((group, groupIndex) => {
        const block = group[0].block;
        group.forEach((row, rowIndex) => {
          const tr = addRow(tbody, `${rowIndex === 0 ? "block-line" : ""} ${rowIndex === 7 ? "block-end" : ""}`);
          if (rowIndex === 0) {
            addCell(tr, block.port, { rowspan: 5, colspan: 2, className: "block-port" });
          }
          if (rowIndex === 5) {
            addCell(tr, "ETB", { className: "muted-cell" });
            addCell(tr, block.etb || "", { className: String(block.etb).toUpperCase() === "SKIP" ? "skip" : "muted-cell" });
          }
          if (rowIndex === 6) {
            addCell(tr, "ETD", { className: "muted-cell" });
            addCell(tr, block.etd || "", { className: String(block.etd).toUpperCase() === "SKIP" ? "skip" : "muted-cell" });
          }
          if (rowIndex === 7) {
            addCell(tr, "", { colspan: 2, className: "muted-cell" });
          }

          addCell(tr, row.label, { className: "label" });
          model.sheet.pods.forEach((pod, podIndex) => {
            if (row.offset === 6) {
              addCell(tr, "", {
                colspan: 2,
                className: editableClass(block.type),
                contenteditable: block.type !== "TOTAL",
                dataset: { block: groupIndex, row: rowIndex, pod: podIndex, side: "weight" }
              });
              return;
            }
            const editable = block.type !== "TOTAL" && row.offset < 6;
            addCell(tr, "", {
              className: editable ? "editable" : "computed",
              contenteditable: editable,
              dataset: { block: groupIndex, row: rowIndex, pod: podIndex, side: "left" }
            });
            addCell(tr, "", {
              className: editable ? "editable" : "computed",
              contenteditable: editable,
              dataset: { block: groupIndex, row: rowIndex, pod: podIndex, side: "right" }
            });
          });

          addCell(tr, "", { className: "computed", dataset: { total: "left", block: groupIndex, row: rowIndex } });
          addCell(tr, "", { className: "computed", dataset: { total: "right", block: groupIndex, row: rowIndex } });
          addCell(tr, "", { className: "computed", dataset: { total: "teus", block: groupIndex, row: rowIndex } });
          addCell(tr, "", { className: "computed", dataset: { metric: "robAll", block: groupIndex, row: rowIndex } });
          addCell(tr, "", { className: "computed", dataset: { metric: "robLd", block: groupIndex, row: rowIndex } });
          addCell(tr, "", { className: "computed", dataset: { metric: "utilAll", block: groupIndex, row: rowIndex } });
          addCell(tr, "", { className: "computed", dataset: { metric: "utilLd", block: groupIndex, row: rowIndex } });
          addCell(tr, "", { className: "computed", dataset: { metric: "avlTeu", block: groupIndex, row: rowIndex } });
          addCell(tr, "", { className: "computed", dataset: { metric: "avlWeight", block: groupIndex, row: rowIndex } });
          addCell(tr, "", { className: "computed", dataset: { metric: "rf", block: groupIndex, row: rowIndex } });
        });
      });

      return table;
    }

    function editableClass(type) {
      return type === "TOTAL" ? "computed" : "editable";
    }

    function addRow(parent, className = "") {
      const tr = document.createElement("tr");
      if (className.trim()) tr.className = className.trim();
      parent.appendChild(tr);
      return tr;
    }

    function addCell(row, text, options = {}) {
      const cell = document.createElement(options.tag || "td");
      cell.textContent = text ?? "";
      if (options.colspan) cell.colSpan = options.colspan;
      if (options.rowspan) cell.rowSpan = options.rowspan;
      if (options.className) cell.className = options.className;
      if (options.contenteditable) {
        cell.contentEditable = "true";
        cell.inputMode = "decimal";
      }
      if (options.dataset) {
        Object.entries(options.dataset).forEach(([key, value]) => {
          cell.dataset[key] = value;
        });
      }
      row.appendChild(cell);
      return cell;
    }

    function recalcTable(table) {
      const sheetName = table.dataset.sheet;
      const model = state.tableData[sheetName];
      if (!model) return;

      const blockCount = model.blocks.length;
      const podCount = model.sheet.pods.length;
      const totalBlockIndex = blockCount - 1;

      for (let b = 0; b < blockCount; b += 1) {
        for (let r = 0; r < 8; r += 1) {
          const row = model.rows[b][r];
          row.totals = { left: 0, right: 0, teus: 0 };
          for (let p = 0; p < podCount; p += 1) {
            if (r === 6) {
              const cell = table.querySelector(`[data-block="${b}"][data-row="${r}"][data-pod="${p}"][data-side="weight"]`);
              const value = b === totalBlockIndex ? 0 : parseCellNumber(cell?.textContent);
              row.cells[p] = { left: value, right: 0 };
              row.totals.left += value;
              continue;
            }
            const leftCell = table.querySelector(`[data-block="${b}"][data-row="${r}"][data-pod="${p}"][data-side="left"]`);
            const rightCell = table.querySelector(`[data-block="${b}"][data-row="${r}"][data-pod="${p}"][data-side="right"]`);
            const left = b === totalBlockIndex || r === 7 ? 0 : parseCellNumber(leftCell?.textContent);
            const right = b === totalBlockIndex || r === 7 ? 0 : parseCellNumber(rightCell?.textContent);
            row.cells[p] = { left, right };
            if (r < 6) {
              row.totals.left += left;
              row.totals.right += right;
              row.totals.teus += left + right * 2;
            }
          }
        }
      }

      for (let b = 0; b < totalBlockIndex; b += 1) {
        for (let p = 0; p < podCount; p += 1) {
          let left = 0;
          let right = 0;
          for (let r = 0; r < 6; r += 1) {
            left += model.rows[b][r].cells[p].left;
            right += model.rows[b][r].cells[p].right;
          }
          const ttlLeft = table.querySelector(`[data-block="${b}"][data-row="7"][data-pod="${p}"][data-side="left"]`);
          const ttlRight = table.querySelector(`[data-block="${b}"][data-row="7"][data-pod="${p}"][data-side="right"]`);
          if (ttlLeft) ttlLeft.textContent = cellText(left);
          if (ttlRight) ttlRight.textContent = cellText(right);
          model.rows[b][7].cells[p] = { left, right };
          model.rows[b][7].totals.left += left;
          model.rows[b][7].totals.right += right;
          model.rows[b][7].totals.teus += left + right * 2;
        }
      }

      for (let r = 0; r < 7; r += 1) {
        for (let p = 0; p < podCount; p += 1) {
          let left = 0;
          let right = 0;
          for (let b = 0; b < totalBlockIndex; b += 1) {
            left += model.rows[b][r].cells[p].left;
            right += model.rows[b][r].cells[p].right;
          }
          const totalLeft = table.querySelector(`[data-block="${totalBlockIndex}"][data-row="${r}"][data-pod="${p}"][data-side="${r === 6 ? "weight" : "left"}"]`);
          const totalRight = table.querySelector(`[data-block="${totalBlockIndex}"][data-row="${r}"][data-pod="${p}"][data-side="right"]`);
          if (totalLeft) totalLeft.textContent = cellText(left, r === 6 ? 1 : 0);
          if (totalRight) totalRight.textContent = r === 6 ? "" : cellText(right);
          model.rows[totalBlockIndex][r].cells[p] = { left, right };
          model.rows[totalBlockIndex][r].totals.left += left;
          model.rows[totalBlockIndex][r].totals.right += right;
          if (r < 6) {
            model.rows[totalBlockIndex][r].totals.teus += left + right * 2;
          }
        }
      }

      for (let p = 0; p < podCount; p += 1) {
        const left = model.rows[totalBlockIndex].slice(0, 6).reduce((sum, row) => sum + row.cells[p].left, 0);
        const right = model.rows[totalBlockIndex].slice(0, 6).reduce((sum, row) => sum + row.cells[p].right, 0);
        const ttlLeft = table.querySelector(`[data-block="${totalBlockIndex}"][data-row="7"][data-pod="${p}"][data-side="left"]`);
        const ttlRight = table.querySelector(`[data-block="${totalBlockIndex}"][data-row="7"][data-pod="${p}"][data-side="right"]`);
        if (ttlLeft) ttlLeft.textContent = cellText(left);
        if (ttlRight) ttlRight.textContent = cellText(right);
        model.rows[totalBlockIndex][7].cells[p] = { left, right };
      }

      for (let b = 0; b < blockCount; b += 1) {
        for (let r = 0; r < 8; r += 1) {
          const row = model.rows[b][r];
          const leftTotal = table.querySelector(`[data-total="left"][data-block="${b}"][data-row="${r}"]`);
          const rightTotal = table.querySelector(`[data-total="right"][data-block="${b}"][data-row="${r}"]`);
          const teuTotal = table.querySelector(`[data-total="teus"][data-block="${b}"][data-row="${r}"]`);
          if (r === 6) {
            if (leftTotal) leftTotal.textContent = cellText(row.totals.left, 1);
            if (rightTotal) rightTotal.textContent = "";
            if (teuTotal) teuTotal.textContent = "";
          } else if (r < 6 || r === 7) {
            const left = r === 7
              ? row.cells.reduce((sum, cell) => sum + cell.left, 0)
              : row.totals.left;
            const right = r === 7
              ? row.cells.reduce((sum, cell) => sum + cell.right, 0)
              : row.totals.right;
            if (leftTotal) leftTotal.textContent = cellText(left);
            if (rightTotal) rightTotal.textContent = cellText(right);
            if (teuTotal) teuTotal.textContent = cellText(left + right * 2);
          }
        }
      }

      recalcRobMetrics(table, model);
    }

    function recalcRobMetrics(table, model) {
      const totalBlockIndex = model.blocks.length - 1;
      const allocation = model.sheet.allocation;
      let prevAll = 0;
      let prevLd = 0;
      let prevWeight = 0;
      let prevRf = allocation.rf || 0;

      for (let b = 0; b < totalBlockIndex; b += 1) {
        const block = model.blocks[b];
        const loadAll = sumTeus(model.rows[b], 0, 6);
        const loadLd = sumTeus(model.rows[b], 0, 5);
        const loadWeight = model.rows[b][6].totals.left;
        const loadRf = model.rows[b][4].totals.left + model.rows[b][4].totals.right;
        let dischargeTeu = 0;
        let dischargeMt = 0;
        let dischargeWeight = 0;
        let dischargeRf = 0;

        if (b > 0) {
          const podIndex = findDischargePodIndex(model.sheet.pods, block);
          if (podIndex >= 0) {
            for (let r = 0; r < 6; r += 1) {
              const cell = model.rows[totalBlockIndex][r].cells[podIndex];
              const teu = cell.left + cell.right * 2;
              dischargeTeu += teu;
              if (r === 4) dischargeRf += cell.left + cell.right;
              if (r === 5) dischargeMt += teu;
            }
            dischargeWeight = model.rows[totalBlockIndex][6].cells[podIndex].left;
          }
        }

        const robAll = prevAll + loadAll - dischargeTeu;
        const robLd = prevLd + loadLd - (dischargeTeu - dischargeMt);
        const robWeight = prevWeight + loadWeight - dischargeWeight;
        const robLdWeight = robWeight - (robAll - robLd) * 2;
        const rf = b === 0 ? (allocation.rf || 0) - loadRf : prevRf - loadRf + dischargeRf;

        setMetric(table, b, 0, "robAll", robAll);
        setMetric(table, b, 0, "robLd", robLd);
        setMetric(table, b, 0, "utilAll", allocation.teus ? robAll / allocation.teus : "");
        setMetric(table, b, 0, "utilLd", allocation.teus ? robLd / allocation.teus : "");
        setMetric(table, b, 6, "robAll", robWeight, 1);
        setMetric(table, b, 6, "robLd", robLdWeight, 1);
        setMetric(table, b, 6, "utilAll", allocation.mt ? robWeight / allocation.mt : "");
        setMetric(table, b, 6, "utilLd", allocation.mt ? robLdWeight / allocation.mt : "");
        setMetric(table, b, 7, "avlTeu", allocation.teus ? allocation.teus - robAll : "");
        setMetric(table, b, 6, "avlWeight", allocation.mt ? allocation.mt - robWeight : "", 1);
        setMetric(table, b, 4, "rf", rf);

        prevAll = robAll;
        prevLd = robLd;
        prevWeight = robWeight;
        prevRf = rf;
      }
    }

    function sumTeus(rows, start, end) {
      let total = 0;
      for (let r = start; r < end; r += 1) {
        total += rows[r].totals.teus;
      }
      return total;
    }

    function setMetric(table, block, row, metric, value, decimals = 0) {
      const cell = table.querySelector(`[data-metric="${metric}"][data-block="${block}"][data-row="${row}"]`);
      if (!cell) return;
      const isPercent = metric === "utilAll" || metric === "utilLd";
      cell.textContent = isPercent ? percentText(value) : cellText(value, decimals);
      cell.classList.remove("bad", "good", "warn");
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return;
      if (isPercent && numeric === 1) cell.classList.add("good");
      if (isPercent && numeric > 1) cell.classList.add("bad");
      if ((metric === "avlTeu" || metric === "avlWeight" || metric === "rf") && numeric < 0) {
        cell.classList.add("warn");
      }
    }

    function appendText(parent, tag, text, className = "") {
      const element = document.createElement(tag);
      element.textContent = cleanDisplayText(text);
      if (className) element.className = className;
      parent.appendChild(element);
      return element;
    }

    function cleanDisplayText(text) {
      return String(text ?? "");
    }

    function previewNumber(value, decimals = 0) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "-";
      return formatInputNumber(numeric, decimals) || "0";
    }

    function addMetricBox(parent, label, value, decimals = 0) {
      const box = appendText(parent, "div", "", "metric-box");
      appendText(box, "div", label, "metric-label");
      appendText(box, "div", previewNumber(value, decimals), "metric-value");
    }

    function addPartnerSummary(parent, carriers) {
      appendText(parent, "div", `Partner BSA (${carriers.length})`, "preview-section-title");
      const table = document.createElement("table");
      table.className = "partner-summary-table";
      const header = table.createTHead().insertRow();
      ["Partner", "WB TEU", "EB TEU", "Ton/TEU", "WB MT", "EB MT", "WB RF", "EB RF"].forEach((text) => {
        appendText(header, "th", text);
      });
      const body = table.createTBody();
      carriers.forEach((carrier) => {
        const row = body.insertRow();
        appendText(row, "td", carrier.code || "-");
        appendText(row, "td", previewNumber(carrier.wbTeus));
        appendText(row, "td", previewNumber(carrier.ebTeus));
        appendText(row, "td", previewNumber(carrier.tonPerTeu, 2));
        appendText(row, "td", previewNumber(carrier.wbMt));
        appendText(row, "td", previewNumber(carrier.ebMt));
        appendText(row, "td", previewNumber(carrier.wbRf));
        appendText(row, "td", previewNumber(carrier.ebRf));
      });
      parent.appendChild(table);
    }

    function routeLabelFor(direction) {
      const lookup = state.currentLookup;
      if (!lookup) return direction;
      if (direction === "WB") return lookup.currentWVvd || "WB";
      return lookup.currentEVvd || "EB";
    }

    function previewCalls(direction, input) {
      const lookup = state.currentLookup;
      if (lookup) {
        const calls = direction === "WB" ? lookup.wbCalls : lookup.ebCalls;
        return calls.map((call) => ({ port: call.port, eta: formatMmDd(call.etd) }));
      }
      return input[direction].pols.map((call) => ({ port: call.port, eta: call.etd }));
    }

    function addRouteCell(row, direction, calls) {
      const cell = appendText(row, "td", "", "route-cell");
      const label = appendText(cell, "div", "", "route-label");
      appendText(label, "span", direction);
      appendText(label, "span", `${routeLabelFor(direction)} · ${calls.length} ports`);
      const chain = appendText(cell, "div", "", "port-chain");
      if (!calls.length) {
        appendText(chain, "span", "No schedule found", "empty-route");
        return;
      }
      calls.forEach((call) => {
        const item = appendText(chain, "span", "", `port-call ${String(call.eta).toUpperCase() === "SKIP" ? "skip" : ""}`);
        appendText(item, "strong", call.port);
        appendText(item, "span", call.eta || "");
      });
    }

    function buildSchedulePreview(input) {
      const wrap = document.createElement("div");
      wrap.className = "schedule-view";
      const head = appendText(wrap, "div", "", "schedule-head");
      const titleBlock = appendText(head, "div", "");
      appendText(titleBlock, "div", `${input.vesselName} / ${input.vvd}`, "schedule-title");
      appendText(
        titleBlock,
        "div",
        `Lane ${input.serviceLane || "-"} · Report ${input.reportDate || "-"}`,
        "schedule-meta"
      );
      appendText(head, "div", `${input.carriers.length} Partner${input.carriers.length === 1 ? "" : "s"}`, "status");

      const metrics = appendText(wrap, "div", "", "allocation-strip");
      addMetricBox(metrics, "WB TEU", input.WB.allocation.teus);
      addMetricBox(metrics, "EB TEU", input.EB.allocation.teus);
      addMetricBox(metrics, "WB MT", input.WB.allocation.mt);
      addMetricBox(metrics, "EB MT", input.EB.allocation.mt);
      addMetricBox(metrics, "WB RF", input.WB.allocation.rf);
      addMetricBox(metrics, "EB RF", input.EB.allocation.rf);

      addPartnerSummary(wrap, input.carriers);
      appendText(wrap, "div", "Port Rotation", "preview-section-title");

      const table = document.createElement("table");
      table.className = "schedule-table";
      const thead = table.createTHead();
      const header = thead.insertRow();
      ["VVD", "Lane", "Vessel", "WB Port Sequence", "EB Port Sequence"].forEach((text, index) => {
        const th = document.createElement("th");
        th.textContent = text;
        if (index < 3) th.className = "meta-col";
        header.appendChild(th);
      });

      const body = table.createTBody();
      const row = body.insertRow();
      appendText(row, "td", input.vvd);
      appendText(row, "td", input.serviceLane || "-");
      appendText(row, "td", input.vesselName || "-");
      addRouteCell(row, "WB", previewCalls("WB", input));
      addRouteCell(row, "EB", previewCalls("EB", input));
      wrap.appendChild(table);
      return wrap;
    }

    function render() {
      saveEntriesFromCurrentTable();
      const input = readInputs();
      state.tableData.WB = makeTableModel(input, "WB");
      state.tableData.EB = makeTableModel(input, "EB");
      $("summaryLine").textContent = `Schedule preview · ${input.vesselName} / ${input.vvd} · ${input.serviceLane || "-"}`;
      $("sheetWrap").replaceChildren(buildSchedulePreview(input));
      $("status").textContent = `WB ${previewCalls("WB", input).length} ports · EB ${previewCalls("EB", input).length} ports`;
      return;
      $("status").textContent = `WB ${input.WB.pods.length} ports · EB ${input.EB.pods.length} ports`;
    }

    function parseBulkInput() {
      const text = $("bulkText").value;
      if (!text.trim()) return;
      const sections = { wbPod: [], wbPol: [], ebPod: [], ebPol: [] };
      let current = null;

      text.split(/\r?\n/).forEach((rawLine) => {
        const line = rawLine.trim();
        if (!line) return;
        const lower = line.toLowerCase();
        const valueAfterColon = /[:：]/.test(line) ? line.split(/[:：]/).slice(1).join(":").trim() : "";

        if (/^(船名|vessel|vessel name)\s*[:：]/i.test(line)) $("vesselName").value = valueAfterColon;
        else if (/^vvd\s*[:：]/i.test(line)) $("vvd").value = valueAfterColon.toUpperCase();
        else if (/^(航线|service lane|lane)\s*[:：]/i.test(line)) $("serviceLane").value = valueAfterColon;
        else if (/^(日期|report date)\s*[:：]/i.test(line)) $("reportDate").value = valueAfterColon;
        else if (/^teus?\s*[:：]/i.test(line)) $("wbTeus").value = numericText(valueAfterColon);
        else if (/^mt\s*[:：]/i.test(line)) $("wbMt").value = numericText(valueAfterColon);
        else if (/^rf\s*[:：]/i.test(line)) $("wbRf").value = numericText(valueAfterColon);
        else if (/^wb\s+pod\s*[:：]?/i.test(lower)) current = "wbPod";
        else if (/^wb\s+pol\s*[:：]?/i.test(lower)) current = "wbPol";
        else if (/^eb\s+pod\s*[:：]?/i.test(lower)) current = "ebPod";
        else if (/^eb\s+pol\s*[:：]?/i.test(lower)) current = "ebPol";
        else if (current) sections[current].push(line);
      });

      if (sections.wbPod.length) $("wbPods").value = sections.wbPod.join("\n");
      if (sections.wbPol.length) $("wbPols").value = sections.wbPol.join("\n");
      if (sections.ebPod.length) $("ebPods").value = sections.ebPod.join("\n");
      if (sections.ebPol.length) $("ebPols").value = sections.ebPol.join("\n");
      syncBsaWeightsFromTeu();
      render();
    }

    function numericText(text) {
      const value = String(text || "").match(/-?\d+(?:\.\d+)?/);
      return value ? value[0] : "";
    }

    function activeTable() {
      return $("sheetWrap").querySelector("table");
    }

    async function copyTable() {
      const table = activeTable();
      if (!table) return;
      const html = table.outerHTML;
      const text = [...table.rows].map((row) => [...row.cells].map((cell) => cell.innerText).join("\t")).join("\n");
      try {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([text], { type: "text/plain" })
          })
        ]);
        $("status").textContent = "Copied";
      } catch {
        await navigator.clipboard.writeText(text);
        $("status").textContent = "Copied text";
      }
    }

    function excelCol(col) {
      let name = "";
      while (col > 0) {
        const mod = (col - 1) % 26;
        name = String.fromCharCode(65 + mod) + name;
        col = Math.floor((col - mod) / 26);
      }
      return name;
    }

    function excelCell(col, row) {
      return `${excelCol(col)}${row}`;
    }

    function excelSheetRef(name) {
      return `'${String(name).replace(/'/g, "''")}'`;
    }

    function sumFormula(terms) {
      const clean = terms.filter(Boolean);
      return clean.length ? clean.join("+") : "0";
    }

    function safeExcelFormula(formula) {
      const raw = String(formula || "0").trim();
      const body = raw.startsWith("=") ? raw.slice(1) : raw;
      if (/^IFERROR\(/i.test(body)) return body;
      return `IFERROR(${body},0)`;
    }

    function nRef(cellRef) {
      return `N(${cellRef})`;
    }

    function excelBorder(style = "thin") {
      return {
        style,
        color: { argb: "FF000000" }
      };
    }

    function fullBorder(style = "thin") {
      const side = excelBorder(style);
      return {
        top: side,
        left: side,
        bottom: side,
        right: side
      };
    }

    function setRowBottomBorder(ws, row, lastCol, style = "medium") {
      for (let col = 1; col <= lastCol; col += 1) {
        const cell = ws.getCell(row, col);
        cell.border = {
          ...(cell.border || fullBorder("thin")),
          bottom: excelBorder(style)
        };
      }
    }

    function styleOfBorder(cell, sideName) {
      return cell.border?.[sideName]?.style || null;
    }

    function setExcelBorder(cell, sides = {}) {
      const border = {};
      ["top", "bottom", "left", "right"].forEach((sideName) => {
        const style = sides[sideName];
        if (style) border[sideName] = excelBorder(style);
      });
      cell.border = border;
    }

    function applyTemplateBorders(ws, summary, podLeftCols, blockStarts, totalStart, finalRow, moveSummaryStart) {
      const maxCol = summary.last;
      const summaryLeftCols = [
        summary.total20,
        summary.ttl,
        summary.robAll,
        summary.utilAll,
        summary.avlTeu,
        summary.rf
      ];
      const setBorder = (row, col, sides) => setExcelBorder(ws.getCell(row, col), sides);

      for (let row = 1; row <= finalRow; row += 1) {
        for (let col = 1; col <= maxCol; col += 1) {
          ws.getCell(row, col).border = {};
        }
      }

      for (let col = 1; col <= maxCol; col += 1) {
        setBorder(2, col, { top: "thick" });
        setBorder(3, col, { top: "medium" });
        setBorder(5, col, { bottom: "medium" });
      }

      [3, 4, 5].forEach((row) => {
        let cell = ws.getCell(row, 3);
        setExcelBorder(cell, {
          right: "medium",
          top: styleOfBorder(cell, "top"),
          bottom: styleOfBorder(cell, "bottom")
        });
        [...podLeftCols, ...summaryLeftCols].forEach((col) => {
          cell = ws.getCell(row, col);
          setExcelBorder(cell, {
            left: "medium",
            top: styleOfBorder(cell, "top"),
            bottom: styleOfBorder(cell, "bottom")
          });
        });
        cell = ws.getCell(row, summary.avlWeight);
        setExcelBorder(cell, {
          left: styleOfBorder(cell, "left"),
          right: "medium",
          top: styleOfBorder(cell, "top"),
          bottom: styleOfBorder(cell, "bottom")
        });
        cell = ws.getCell(row, maxCol);
        setExcelBorder(cell, {
          left: styleOfBorder(cell, "left"),
          right: "medium",
          top: styleOfBorder(cell, "top"),
          bottom: styleOfBorder(cell, "bottom")
        });
      });

      const styleBodyRow = (row, horizontal = null, bottom = null) => {
        for (let col = 1; col <= maxCol; col += 1) {
          let left = null;
          let right = null;
          if (podLeftCols.includes(col) || summaryLeftCols.includes(col)) left = "thin";
          if (col === summary.rf) left = "medium";
          if (col === 2 || col === 3) right = "medium";
          else if (col === summary.avlWeight) right = "medium";
          else if (col === maxCol) right = "thin";
          setBorder(row, col, { left, right, top: horizontal, bottom });
        }
      };

      const styleMergedWeightRow = (row) => {
        [...podLeftCols, summary.total20].forEach((col) => {
          const cell = ws.getCell(row, col);
          setExcelBorder(cell, {
            left: "thin",
            right: styleOfBorder(cell, "right"),
            top: "thin",
            bottom: "thin"
          });
        });
      };

      blockStarts.forEach((start) => {
        for (let row = start; row <= start + 5; row += 1) {
          styleBodyRow(row);
        }
        styleBodyRow(start + 6, "thin", "thin");
        styleMergedWeightRow(start + 6);
        styleBodyRow(start + 7, "thin", "medium");
      });

      const styleBottomSummaryRow = (row) => {
        for (let col = 1; col <= maxCol; col += 1) {
          ws.getCell(row, col).border = {};
        }
        [1, 2, 3].forEach((col) => setBorder(row, col, { top: "medium", bottom: "medium" }));
        setBorder(row, 1, { right: "medium", top: "medium", bottom: "medium" });
        setBorder(row, 3, { right: "medium", top: "medium", bottom: "medium" });
        podLeftCols.forEach((left) => {
          const right = left + 1;
          setBorder(row, left, { left: "medium", right: "medium", top: "medium", bottom: "medium" });
          setBorder(row, right, { right: "medium", top: "medium", bottom: "medium" });
        });
      };

      [moveSummaryStart, moveSummaryStart + 1].forEach(styleBottomSummaryRow);
      for (let row = moveSummaryStart + 2; row <= moveSummaryStart + 3; row += 1) {
        for (let col = 1; col <= maxCol; col += 1) {
          ws.getCell(row, col).border = {};
        }
      }
      for (let row = moveSummaryStart + 4; row <= finalRow; row += 1) {
        styleBottomSummaryRow(row);
      }

      for (let col = 1; col <= maxCol; col += 1) {
        const topCell = ws.getCell(1, col);
        setExcelBorder(topCell, {
          left: styleOfBorder(topCell, "left"),
          right: styleOfBorder(topCell, "right"),
          top: "medium",
          bottom: styleOfBorder(topCell, "bottom")
        });
        const secondRowCell = ws.getCell(2, col);
        setExcelBorder(secondRowCell, {
          left: styleOfBorder(secondRowCell, "left"),
          right: styleOfBorder(secondRowCell, "right"),
          top: "thick",
          bottom: styleOfBorder(secondRowCell, "bottom")
        });
      }

      for (let row = 1; row <= totalStart + 7; row += 1) {
        let cell = ws.getCell(row, 1);
        setExcelBorder(cell, {
          left: "medium",
          right: styleOfBorder(cell, "right"),
          top: styleOfBorder(cell, "top"),
          bottom: styleOfBorder(cell, "bottom")
        });
        cell = ws.getCell(row, maxCol);
        setExcelBorder(cell, {
          left: styleOfBorder(cell, "left"),
          right: "medium",
          top: styleOfBorder(cell, "top"),
          bottom: styleOfBorder(cell, "bottom")
        });
      }

      if (summary.spacer) {
        for (let row = 1; row <= finalRow; row += 1) {
          const cell = ws.getCell(row, summary.spacer);
          setExcelBorder(cell, {
            left: "medium",
            right: "medium",
            top: styleOfBorder(cell, "top"),
            bottom: styleOfBorder(cell, "bottom")
          });
        }
      }
    }

    function conditionalFill(argb) {
      return { type: "pattern", pattern: "solid", bgColor: { argb } };
    }

    function addExportConditionalFormatting(ws, summary, totalStart) {
      if (typeof ws.addConditionalFormatting !== "function") return;
      const utilRef = `${excelCol(summary.utilAll)}6:${excelCol(summary.utilLd)}${totalStart + 7}`;
      const avlRef = `${excelCol(summary.avlTeu)}6:${excelCol(summary.avlWeight)}${totalStart + 7}`;
      ws.addConditionalFormatting({
        ref: utilRef,
        rules: [
          {
            type: "cellIs",
            operator: "equal",
            formulae: ["1"],
            style: { fill: conditionalFill("FFC6EFCE") }
          },
          {
            type: "cellIs",
            operator: "greaterThan",
            formulae: ["1"],
            style: {
              fill: conditionalFill("FFFFC7CE"),
              font: { color: { argb: "FFFF0000" }, bold: true }
            }
          }
        ]
      });
      ws.addConditionalFormatting({
        ref: avlRef,
        rules: [
          {
            type: "cellIs",
            operator: "lessThan",
            formulae: ["0"],
            style: {
              fill: conditionalFill("FFFFFF00"),
              font: { color: { argb: "FFFF0000" }, bold: true }
            }
          }
        ]
      });
    }

    function safeMerge(ws, r1, c1, r2, c2) {
      if (r1 === r2 && c1 === c2) return;
      ws.mergeCells(r1, c1, r2, c2);
    }

    function setCell(ws, row, col, value, style = {}) {
      const cell = ws.getCell(row, col);
      cell.value = value;
      applyExcelStyle(cell, style);
      return cell;
    }

    function setFormulaCell(ws, row, col, formula, style = {}) {
      const cell = ws.getCell(row, col);
      cell.value = { formula: safeExcelFormula(formula), result: 0 };
      applyExcelStyle(cell, style);
      return cell;
    }

    function applyExcelStyle(cell, style = {}) {
      cell.alignment = style.alignment || { horizontal: "center", vertical: "middle" };
      cell.font = style.font || {
        name: "Calibri",
        size: 11,
        bold: !!style.bold,
        color: { argb: "FF000000" }
      };
      if (style.fill) {
        cell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: style.fill } };
      }
      if (style.numFmt) cell.numFmt = style.numFmt;
      cell.border = style.border || fullBorder(style.borderStyle || "thin");
    }

    function entryValue(sheetName, block, row, pod, side) {
      return state.entries[sheetName]?.[entryKey(block, row, pod, side)] || "";
    }

    function entryNumberValue(sheetName, block, row, pod, side) {
      const value = parseCellNumber(entryValue(sheetName, block, row, pod, side));
      return value || null;
    }

    function robInputFormula(col, row, rowShift = 0) {
      const ref = `${excelSheetRef("ROB_INPUT")}!${excelCell(col, row + rowShift)}`;
      return `N(${ref})`;
    }

    function buildExcelSheet(workbook, input, sheetName) {
      const model = makeTableModel(input, sheetName);
      const ws = workbook.addWorksheet(sheetName, {
        views: [{ showGridLines: false, state: "frozen", ySplit: 5 }]
      });
      if (/^WB(?:_|$)/i.test(sheetName)) {
        ws.properties.tabColor = { argb: "FF5B9BD5" };
      } else if (/^EB(?:_|$)/i.test(sheetName)) {
        ws.properties.tabColor = { argb: "FFED7D31" };
      }
      ws.properties.defaultColWidth = 9;

      const n = model.sheet.pods.length;
      const podLeftCols = Array.from({ length: n }, (_, i) => 4 + i * 2);
      const podRightCols = podLeftCols.map((col) => col + 1);
      const podEnd = 3 + n * 2;
      const spacerCol = podEnd + 1;
      const summaryStart = spacerCol + 1;
      const summary = {
        total20: summaryStart,
        total40: summaryStart + 1,
        ttl: summaryStart + 2,
        robAll: summaryStart + 3,
        robLd: summaryStart + 4,
        utilAll: summaryStart + 5,
        utilLd: summaryStart + 6,
        avlTeu: summaryStart + 7,
        avlWeight: summaryStart + 8,
        rf: summaryStart + 9,
        spacer: spacerCol,
        last: summaryStart + 9
      };
      const maxRow = 5 + model.blocks.length * 8;
      const moveSummaryStart = maxRow + 1;
      const finalRow = maxRow + 7;
      const headerFill = "FF99CCFF";
      const yellowFill = "FFFFFF00";
      const whiteFill = "FFFFFFFF";
      const countFmt = '0;-0;;@';
      const weightFmt = '0.0;-0.0;;@';
      const percentFmt = '0%;-0%;;@';
      const visibleCountFmt = "0";
      const visibleWeightFmt = "0.0";
      const headerFont = { name: "Carlito", size: 11, bold: true, color: { argb: "FF000000" } };
      const skipFont = { name: "Carlito", size: 11, bold: true, color: { argb: "FFFF0000" } };
      const baseStyle = { fill: whiteFill };
      const headerStyle = { fill: headerFill, font: headerFont };
      const yellowStyle = { fill: yellowFill, font: headerFont };
      const skipStyle = { fill: yellowFill, font: skipFont };
      const computedStyle = { fill: whiteFill };
      const moveLabelStyle = { fill: whiteFill, bold: true };
      const moveValueStyle = { fill: whiteFill, bold: true };

      for (let col = 1; col <= summary.last; col += 1) {
        let width = 7.5;
        if (col === 1) width = 8;
        else if (col === 2) width = 9;
        else if (col === 3) width = 11;
        else if (col === summary.spacer) width = 2;
        else if (col >= summaryStart) width = 9.5;
        ws.getColumn(col).width = width;
      }
      for (let row = 1; row <= finalRow; row += 1) {
        ws.getRow(row).height = row <= 5 ? 20 : 18;
      }

      const totalCols = summary.last;
      const titleEnd = Math.min(7, totalCols);
      safeMerge(ws, 1, 1, 1, titleEnd);
      if (spacerCol - 1 >= 8) safeMerge(ws, 1, 8, 1, spacerCol - 1);
      safeMerge(ws, 1, summaryStart, 1, summary.last);
      setCell(ws, 1, 1, "Vessel Space Utilization Report -", headerStyle);
      if (spacerCol - 1 >= 8) setCell(ws, 1, 8, "", headerStyle);
      setCell(ws, 1, summaryStart, `Report Generated: ${input.reportDate}`, headerStyle);

      safeMerge(ws, 2, 1, 2, 3);
      if (podEnd >= 4) safeMerge(ws, 2, 4, 2, Math.min(8, podEnd));
      safeMerge(ws, 2, summary.total20, 2, summary.total20 + 1);
      setCell(ws, 2, 1, `Service Lane : ${input.serviceLane}`, headerStyle);
      setCell(ws, 2, 4, `${input.vesselName} / ${input.vvd}`, headerStyle);
      setCell(ws, 2, summary.total20, `${model.sheet.allocationLabel} :`, headerStyle);
      setCell(ws, 2, summary.total20 + 2, Number(model.sheet.allocation.teus) || 0, { ...yellowStyle, numFmt: countFmt });
      setCell(ws, 2, summary.total20 + 3, "TEUS", headerStyle);
      setCell(ws, 2, summary.total20 + 5, Number(model.sheet.allocation.mt) || 0, { ...yellowStyle, numFmt: countFmt });
      setCell(ws, 2, summary.total20 + 6, "MT", headerStyle);
      setCell(ws, 2, summary.total20 + 7, Number(model.sheet.allocation.rf) || 0, { ...yellowStyle, numFmt: countFmt });
      setCell(ws, 2, summary.total20 + 8, " RF PLUGS ", headerStyle);

      safeMerge(ws, 3, 1, 3, 3);
      safeMerge(ws, 4, 1, 4, 3);
      safeMerge(ws, 5, 1, 5, 3);
      setCell(ws, 3, 1, "POD", headerStyle);
      setCell(ws, 4, 1, "ETA", headerStyle);
      setCell(ws, 5, 1, "POL", headerStyle);
      model.sheet.pods.forEach((pod, index) => {
        const left = podLeftCols[index];
        safeMerge(ws, 3, left, 3, left + 1);
        safeMerge(ws, 4, left, 4, left + 1);
        setCell(ws, 3, left, pod.port, headerStyle);
        setCell(ws, 4, left, pod.eta, String(pod.eta).toUpperCase() === "SKIP" ? skipStyle : headerStyle);
        setCell(ws, 5, left, "20'", headerStyle);
        setCell(ws, 5, left + 1, "40'", headerStyle);
      });
      safeMerge(ws, 3, summary.total20, 3, summary.total40);
      safeMerge(ws, 4, summary.total20, 4, summary.total40);
      safeMerge(ws, 3, summary.robAll, 3, summary.robLd);
      safeMerge(ws, 4, summary.robAll, 4, summary.robLd);
      safeMerge(ws, 3, summary.utilAll, 3, summary.utilLd);
      safeMerge(ws, 4, summary.utilAll, 4, summary.utilLd);
      safeMerge(ws, 3, summary.avlTeu, 3, summary.avlWeight);
      safeMerge(ws, 4, summary.avlTeu, 4, summary.avlWeight);
      setCell(ws, 3, summary.total20, "TOTAL", headerStyle);
      setCell(ws, 5, summary.total20, "20'", headerStyle);
      setCell(ws, 5, summary.total40, "40'", headerStyle);
      setCell(ws, 3, summary.ttl, "TTL", headerStyle);
      setCell(ws, 5, summary.ttl, "TEUS", headerStyle);
      setCell(ws, 3, summary.robAll, "ROB (TEUS)", headerStyle);
      setCell(ws, 5, summary.robAll, "(All)", headerStyle);
      setCell(ws, 5, summary.robLd, "(LD)", headerStyle);
      setCell(ws, 3, summary.utilAll, "UTILISATION", headerStyle);
      setCell(ws, 5, summary.utilAll, "(All)", headerStyle);
      setCell(ws, 5, summary.utilLd, "(LD)", headerStyle);
      setCell(ws, 3, summary.avlTeu, "AVL", headerStyle);
      setCell(ws, 5, summary.avlTeu, "TEUs", headerStyle);
      setCell(ws, 5, summary.avlWeight, "Weight", headerStyle);
      setCell(ws, 3, summary.rf, "RF Plug", headerStyle);

      const totalBlockIndex = model.blocks.length - 1;
      const blockStarts = model.blocks.map((_, index) => 6 + index * 8);
      const totalStart = blockStarts[totalBlockIndex];
      const allocTeuCell = excelCell(summary.total20 + 2, 2);
      const allocWeightCell = excelCell(summary.total20 + 5, 2);
      const allocRfCell = excelCell(summary.total20 + 7, 2);
      const allocTeuValue = nRef(allocTeuCell);
      const allocWeightValue = nRef(allocWeightCell);
      const allocRfValue = nRef(allocRfCell);
      const robInputRowShift = Number(input.robInputRowShift) || 0;
      const isWbSheet = sheetName === "WB" || model.sheet.direction === "WB";

      model.blocks.forEach((block, blockIndex) => {
        const start = blockStarts[blockIndex];
        if (block.type === "TOTAL") safeMerge(ws, start, 1, start + 5, 2);
        else safeMerge(ws, start, 1, start + 4, 2);
        safeMerge(ws, start + 7, 1, start + 7, 2);
        setCell(ws, start, 1, block.port, { ...baseStyle, bold: true });
        if (block.type !== "TOTAL") {
          setCell(ws, start + 5, 1, "ETB", baseStyle);
          setCell(ws, start + 5, 2, block.etb || "", baseStyle);
          setCell(ws, start + 6, 1, "ETD", baseStyle);
          setCell(ws, start + 6, 2, block.etd || "", baseStyle);
        }
        cargoLabels.forEach((label, offset) => {
          const row = start + offset;
          setCell(ws, row, 3, label, { ...baseStyle, bold: true, alignment: { horizontal: "left", vertical: "middle" } });
          model.sheet.pods.forEach((_pod, podIndex) => {
            const left = podLeftCols[podIndex];
            const right = left + 1;
            if (offset === 6) {
              safeMerge(ws, row, left, row, right);
              if (blockIndex === totalBlockIndex) {
                setFormulaCell(
                  ws,
                  row,
                  left,
                  sumFormula(blockStarts.slice(0, totalBlockIndex).map((blockStart) => excelCell(left, blockStart + 6))),
                  { ...computedStyle, numFmt: weightFmt }
                );
              } else {
                const manualWeight = entryNumberValue(sheetName, blockIndex, offset, podIndex, "weight");
                if (isWbSheet && block.type === "ROB" && manualWeight === null) {
                  setFormulaCell(ws, row, left, robInputFormula(left, row, robInputRowShift), { ...baseStyle, numFmt: weightFmt });
                } else {
                  setCell(ws, row, left, manualWeight, { ...baseStyle, numFmt: weightFmt });
                }
              }
              return;
            }
            if (blockIndex === totalBlockIndex) {
              setFormulaCell(
                ws,
                row,
                left,
                sumFormula(blockStarts.slice(0, totalBlockIndex).map((blockStart) => excelCell(left, blockStart + offset))),
                { ...computedStyle, numFmt: countFmt }
              );
              setFormulaCell(
                ws,
                row,
                right,
                sumFormula(blockStarts.slice(0, totalBlockIndex).map((blockStart) => excelCell(right, blockStart + offset))),
                { ...computedStyle, numFmt: countFmt }
              );
            } else if (offset === 7) {
              setFormulaCell(ws, row, left, `SUM(${excelCell(left, start)}:${excelCell(left, start + 5)})`, { ...computedStyle, numFmt: countFmt });
              setFormulaCell(ws, row, right, `SUM(${excelCell(right, start)}:${excelCell(right, start + 5)})`, { ...computedStyle, numFmt: countFmt });
            } else {
              const manualLeft = entryNumberValue(sheetName, blockIndex, offset, podIndex, "left");
              const manualRight = entryNumberValue(sheetName, blockIndex, offset, podIndex, "right");
              if (isWbSheet && block.type === "ROB" && manualLeft === null) {
                setFormulaCell(ws, row, left, robInputFormula(left, row, robInputRowShift), { ...baseStyle, numFmt: countFmt });
              } else {
                setCell(ws, row, left, manualLeft, { ...baseStyle, numFmt: countFmt });
              }
              if (isWbSheet && block.type === "ROB" && manualRight === null) {
                setFormulaCell(ws, row, right, robInputFormula(right, row, robInputRowShift), { ...baseStyle, numFmt: countFmt });
              } else {
                setCell(ws, row, right, manualRight, { ...baseStyle, numFmt: countFmt });
              }
            }
          });

          if (offset === 6) {
            safeMerge(ws, row, summary.total20, row, summary.total40);
            setFormulaCell(ws, row, summary.total20, sumFormula(podLeftCols.map((col) => excelCell(col, row))), { ...computedStyle, numFmt: weightFmt });
            setCell(ws, row, summary.ttl, "", computedStyle);
          } else if (offset === 7) {
            setFormulaCell(ws, row, summary.total20, `SUM(${excelCell(summary.total20, start)}:${excelCell(summary.total20, start + 5)})`, { ...computedStyle, numFmt: countFmt });
            setFormulaCell(ws, row, summary.total40, `SUM(${excelCell(summary.total40, start)}:${excelCell(summary.total40, start + 5)})`, { ...computedStyle, numFmt: countFmt });
            setFormulaCell(ws, row, summary.ttl, `${excelCell(summary.total20, row)}+${excelCell(summary.total40, row)}*2`, { ...computedStyle, numFmt: countFmt });
          } else {
            setFormulaCell(ws, row, summary.total20, sumFormula(podLeftCols.map((col) => excelCell(col, row))), { ...computedStyle, numFmt: countFmt });
            setFormulaCell(ws, row, summary.total40, sumFormula(podRightCols.map((col) => excelCell(col, row))), { ...computedStyle, numFmt: countFmt });
            setFormulaCell(ws, row, summary.ttl, `${excelCell(summary.total20, row)}+${excelCell(summary.total40, row)}*2`, { ...computedStyle, numFmt: countFmt });
          }
        });
      });

      blockStarts.slice(0, totalBlockIndex).forEach((start, blockIndex) => {
        const loadAll = `SUM(${excelCell(summary.ttl, start)}:${excelCell(summary.ttl, start + 5)})`;
        const loadLd = `SUM(${excelCell(summary.ttl, start)}:${excelCell(summary.ttl, start + 4)})`;
        const loadWeight = excelCell(summary.total20, start + 6);
        const loadRf = `${excelCell(summary.total20, start + 4)}+${excelCell(summary.total40, start + 4)}`;
        let dischargeTeu = "0";
        let dischargeMt = "0";
        let dischargeWeight = "0";
        let dischargeRf = "0";
        if (blockIndex > 0) {
          const podIndex = findDischargePodIndex(model.sheet.pods, model.blocks[blockIndex]);
          if (podIndex >= 0) {
            const left = podLeftCols[podIndex];
            const right = podRightCols[podIndex];
            dischargeTeu = sumFormula(Array.from({ length: 6 }, (_, offset) => `${excelCell(left, totalStart + offset)}+${excelCell(right, totalStart + offset)}*2`));
            dischargeMt = `${excelCell(left, totalStart + 5)}+${excelCell(right, totalStart + 5)}*2`;
            dischargeWeight = excelCell(left, totalStart + 6);
            dischargeRf = `${excelCell(left, totalStart + 4)}+${excelCell(right, totalStart + 4)}`;
          }
        }

        const prevStart = blockStarts[blockIndex - 1];
        const robAllFormula = blockIndex === 0 ? loadAll : `${excelCell(summary.robAll, prevStart)}+${loadAll}-(${dischargeTeu})`;
        const robLdFormula = blockIndex === 0 ? loadLd : `${excelCell(summary.robLd, prevStart)}+${loadLd}-((${dischargeTeu})-(${dischargeMt}))`;
        const weightFormula = blockIndex === 0 ? loadWeight : `${excelCell(summary.robAll, prevStart + 6)}+${loadWeight}-(${dischargeWeight})`;
        const rfFormula = blockIndex === 0 ? `${allocRfValue}-(${loadRf})` : `${excelCell(summary.rf, prevStart + 4)}-(${loadRf})+(${dischargeRf})`;

        setFormulaCell(ws, start, summary.robAll, robAllFormula, { ...computedStyle, numFmt: countFmt });
        setFormulaCell(ws, start, summary.robLd, robLdFormula, { ...computedStyle, numFmt: countFmt });
        setFormulaCell(ws, start, summary.utilAll, `IF(${allocTeuValue}>0,${excelCell(summary.robAll, start)}/${allocTeuValue},0)`, { ...computedStyle, numFmt: percentFmt });
        setFormulaCell(ws, start, summary.utilLd, `IF(${allocTeuValue}>0,${excelCell(summary.robLd, start)}/${allocTeuValue},0)`, { ...computedStyle, numFmt: percentFmt });
        setFormulaCell(ws, start + 6, summary.robAll, weightFormula, { ...computedStyle, numFmt: weightFmt });
        setFormulaCell(ws, start + 6, summary.robLd, `${excelCell(summary.robAll, start + 6)}-(${excelCell(summary.robAll, start)}-${excelCell(summary.robLd, start)})*2`, { ...computedStyle, numFmt: weightFmt });
        setFormulaCell(ws, start + 6, summary.utilAll, `IF(${allocWeightValue}>0,${excelCell(summary.robAll, start + 6)}/${allocWeightValue},0)`, { ...computedStyle, numFmt: percentFmt });
        setFormulaCell(ws, start + 6, summary.utilLd, `IF(${allocWeightValue}>0,${excelCell(summary.robLd, start + 6)}/${allocWeightValue},0)`, { ...computedStyle, numFmt: percentFmt });
        setFormulaCell(ws, start + 7, summary.avlTeu, `${allocTeuValue}-${excelCell(summary.robAll, start)}`, { ...computedStyle, numFmt: countFmt });
        setFormulaCell(ws, start + 6, summary.avlWeight, `${allocWeightValue}-${excelCell(summary.robAll, start + 6)}`, { ...computedStyle, numFmt: weightFmt });
        setFormulaCell(ws, start + 4, summary.rf, rfFormula, { ...computedStyle, numFmt: countFmt });
      });

      const blockStartsByPort = new Map();
      blockStarts.slice(0, totalBlockIndex).forEach((start, blockIndex) => {
        const port = model.blocks[blockIndex].port;
        if (!blockStartsByPort.has(port)) blockStartsByPort.set(port, []);
        blockStartsByPort.get(port).push(start);
      });

      const addMoveRow = (row, label, builder, style = moveValueStyle, numFmt = visibleCountFmt) => {
        safeMerge(ws, row, 1, row, 3);
        setCell(ws, row, 1, label, moveLabelStyle);
        model.sheet.pods.forEach((pod, podIndex) => {
          const left = podLeftCols[podIndex];
          const right = podRightCols[podIndex];
          safeMerge(ws, row, left, row, right);
          const value = builder({ pod, podIndex, left, right, row });
          if (typeof value === "string" && value.startsWith("=")) {
            setFormulaCell(ws, row, left, value.slice(1), { ...style, numFmt });
          } else {
            setCell(ws, row, left, value, { ...style, numFmt });
          }
        });
      };

      addMoveRow(moveSummaryStart, "TEUS", ({ left, right }) => (
        `=${sumFormula(Array.from({ length: 6 }, (_, offset) => (
          `${excelCell(left, totalStart + offset)}+${excelCell(right, totalStart + offset)}*2`
        )))}`
      ));
      addMoveRow(moveSummaryStart + 1, "TOTAL MTONS", ({ left }) => (
        `=${excelCell(left, totalStart + 6)}`
      ), moveValueStyle, visibleWeightFmt);
      addMoveRow(moveSummaryStart + 4, "Move counts utilised", ({ pod, left, right }) => {
        const dischargeCount = `${excelCell(left, totalStart + 7)}+${excelCell(right, totalStart + 7)}`;
        const loadCounts = (blockStartsByPort.get(pod.port) || []).map((start) => (
          `${excelCell(summary.total20, start + 7)}+${excelCell(summary.total40, start + 7)}`
        ));
        return `=${sumFormula([dischargeCount, ...loadCounts])}`;
      });
      addMoveRow(moveSummaryStart + 5, "Step Up/Down Move Count", () => null);
      addMoveRow(moveSummaryStart + 6, "Balance Move Count", ({ left }) => (
        `=${excelCell(left, moveSummaryStart + 5)}-${excelCell(left, moveSummaryStart + 4)}`
      ));

      for (let row = 1; row <= finalRow; row += 1) {
        for (let col = 1; col <= summary.last; col += 1) {
          const cell = ws.getCell(row, col);
          if (!cell.style || Object.keys(cell.style).length === 0) {
            applyExcelStyle(cell, row <= 5 ? headerStyle : baseStyle);
          } else {
            cell.border = cell.border || fullBorder("thin");
            cell.alignment = cell.alignment || { horizontal: "center", vertical: "middle" };
            cell.font = cell.font || { name: "Calibri", size: 11, color: { argb: "FF000000" } };
          }
        }
      }
      applyTemplateBorders(ws, summary, podLeftCols, blockStarts, totalStart, finalRow, moveSummaryStart);
      addExportConditionalFormatting(ws, summary, totalStart);
      return {
        ws,
        model,
        summary,
        podLeftCols,
        podRightCols,
        totalStart,
        moveSheetRow: moveSummaryStart + 4,
        moveLimitRow: moveSummaryStart + 5,
        moveBalanceRow: moveSummaryStart + 6,
        finalRow
      };
    }

    function excelSafeSheetName(name) {
      return normalizeText(name).replace(/[\[\]\*\/\\\?:]/g, "-").slice(0, 31) || "Sheet";
    }

    function carrierSheetName(direction, carrier, isMultiCarrier) {
      if (!isMultiCarrier && carrier.code === DEFAULT_CARRIER_CODE) return direction;
      return excelSafeSheetName(`${direction}_${carrier.code}`);
    }

    function totalSheetName(direction) {
      return `${direction}_TOTAL`;
    }

    function sheetDataForCarrier(baseInput, direction, carrier, isMultiCarrier) {
      return {
        ...baseInput[direction],
        direction,
        allocationLabel: isMultiCarrier || carrier.code !== DEFAULT_CARRIER_CODE
          ? `${direction} ${carrier.code}`
          : baseInput[direction].allocationLabel,
        allocation: carrierAllocation(carrier, direction)
      };
    }

    function sheetDataForTotal(baseInput, direction, carriers) {
      return {
        ...baseInput[direction],
        direction,
        allocationLabel: `${direction} TOTAL`,
        allocation: totalCarrierAllocation(carriers, direction)
      };
    }

    function inputForSheet(baseInput, direction, sheetName, sheetData, robInputRowShift = 0) {
      return {
        ...baseInput,
        robInputRowShift,
        [sheetName]: sheetData
      };
    }

    function sumSheetCellFormula(sheetNames, cellRef) {
      return sumFormula(sheetNames.map((name) => `${excelSheetRef(name)}!${cellRef}`));
    }

    function applyTotalSheetFormulas(totalMeta, carrierMetas) {
      if (!totalMeta || !carrierMetas.length) return;
      const sheetNames = carrierMetas.map((meta) => meta.ws.name);
      const totalBlockIndex = totalMeta.model.blocks.length - 1;
      const blockStarts = totalMeta.model.blocks.map((_, index) => 6 + index * 8);
      blockStarts.forEach((start) => {
        cargoLabels.forEach((_label, offset) => {
          const row = start + offset;
          totalMeta.podLeftCols.forEach((left, podIndex) => {
            const right = totalMeta.podRightCols[podIndex];
            if (offset === 6) {
              setFormulaCell(
                totalMeta.ws,
                row,
                left,
                sumSheetCellFormula(sheetNames, excelCell(left, row)),
                { fill: "FFFFFFFF", numFmt: "0.0;-0.0;;@" }
              );
            } else if (offset < 6 || offset === 7) {
              setFormulaCell(
                totalMeta.ws,
                row,
                left,
                sumSheetCellFormula(sheetNames, excelCell(left, row)),
                { fill: "FFFFFFFF", numFmt: "0;-0;;@" }
              );
              setFormulaCell(
                totalMeta.ws,
                row,
                right,
                sumSheetCellFormula(sheetNames, excelCell(right, row)),
                { fill: "FFFFFFFF", numFmt: "0;-0;;@" }
              );
            }
          });
        });
      });
      applyTemplateBorders(
        totalMeta.ws,
        totalMeta.summary,
        totalMeta.podLeftCols,
        blockStarts,
        totalMeta.totalStart,
        totalMeta.finalRow,
        totalMeta.moveSheetRow - 4
      );
    }

    function addRobTransferSheet(workbook, name, pods, options = {}) {
      if (!pods.length) return null;
      const ws = workbook.addWorksheet(name, {
        views: [{ showGridLines: false, state: "frozen", ySplit: 5 }]
      });
      if (options.tabColor) {
        ws.properties.tabColor = { argb: options.tabColor };
      }
      const lastCol = 3 + pods.length * 2;
      const copyLabels = cargoLabels.slice(0, 7);
      const finalRow = 5 + copyLabels.length;
      const headerFill = options.headerFill || "FF99CCFF";
      const noteFill = options.noteFill || "FFFFFFFF";
      const blockFill = options.blockFill || noteFill;
      const whiteFill = "FFFFFFFF";
      const headerFont = { name: "Carlito", size: 11, bold: true, color: { argb: "FF000000" } };
      const headerStyle = { fill: headerFill, font: headerFont };
      const baseStyle = { fill: whiteFill, font: headerFont };
      const noteStyle = { fill: noteFill, font: headerFont };
      const blockStyle = { fill: blockFill, font: headerFont };
      const valueStyle = { fill: whiteFill };

      for (let col = 1; col <= lastCol; col += 1) {
        let width = 7.5;
        if (col === 1) width = 8;
        else if (col === 2) width = 9;
        else if (col === 3) width = 11;
        ws.getColumn(col).width = width;
      }
      for (let row = 1; row <= finalRow; row += 1) {
        ws.getRow(row).height = row <= 5 ? 20 : 18;
      }

      safeMerge(ws, 1, 1, 1, lastCol);
      safeMerge(ws, 2, 1, 2, lastCol);
      setCell(ws, 1, 1, options.title || name, headerStyle);
      setCell(ws, 2, 1, options.note || "", noteStyle);
      safeMerge(ws, 3, 1, 3, 3);
      safeMerge(ws, 4, 1, 4, 3);
      safeMerge(ws, 5, 1, 5, 3);
      setCell(ws, 3, 1, "POD", headerStyle);
      setCell(ws, 4, 1, "ETA", headerStyle);
      setCell(ws, 5, 1, "POL", headerStyle);

      pods.forEach((pod, podIndex) => {
        const left = 4 + podIndex * 2;
        const right = left + 1;
        safeMerge(ws, 3, left, 3, right);
        safeMerge(ws, 4, left, 4, right);
        setCell(ws, 3, left, pod.port, headerStyle);
        setCell(ws, 4, left, pod.eta, headerStyle);
        setCell(ws, 5, left, "20'", headerStyle);
        setCell(ws, 5, right, "40'", headerStyle);
      });

      safeMerge(ws, 6, 1, 11, 2);
      setCell(ws, 6, 1, options.blockLabel || name, { ...blockStyle, alignment: { horizontal: "center", vertical: "middle" } });

      copyLabels.forEach((label, offset) => {
        const row = 6 + offset;
        setCell(ws, row, 3, label, { ...baseStyle, alignment: { horizontal: "left", vertical: "middle" } });
        pods.forEach((_pod, podIndex) => {
          const left = 4 + podIndex * 2;
          const right = left + 1;
          const leftFormula = options.valueFormula?.({ left, right, row, offset, podIndex, side: "left" });
          const rightFormula = options.valueFormula?.({ left, right, row, offset, podIndex, side: "right" });
          if (leftFormula) {
            setFormulaCell(ws, row, left, leftFormula, { ...valueStyle, numFmt: offset === 6 ? "0.0;-0.0;;@" : "0;-0;;@" });
          } else {
            setCell(ws, row, left, null, { ...valueStyle, numFmt: offset === 6 ? "0.0;-0.0;;@" : "0;-0;;@" });
          }
          if (offset === 6) {
            setCell(ws, row, right, null, { ...valueStyle, numFmt: "0.0;-0.0;;@" });
          } else if (rightFormula) {
            setFormulaCell(ws, row, right, rightFormula, { ...valueStyle, numFmt: "0;-0;;@" });
          } else {
            setCell(ws, row, right, null, { ...valueStyle, numFmt: "0;-0;;@" });
          }
        });
      });

      for (let row = 1; row <= finalRow; row += 1) {
        for (let col = 1; col <= lastCol; col += 1) {
          const cell = ws.getCell(row, col);
          cell.border = cell.border || fullBorder("thin");
          cell.alignment = cell.alignment || { horizontal: "center", vertical: "middle" };
          cell.font = cell.font || { name: "Calibri", size: 11, color: { argb: "FF000000" } };
        }
      }
      for (let col = 1; col <= lastCol; col += 1) {
        const top = ws.getCell(1, col);
        top.border = { ...(top.border || fullBorder("thin")), top: excelBorder("medium") };
        const headerBottom = ws.getCell(5, col);
        headerBottom.border = { ...(headerBottom.border || fullBorder("thin")), bottom: excelBorder("medium") };
        const bottom = ws.getCell(finalRow, col);
        bottom.border = { ...(bottom.border || fullBorder("thin")), bottom: excelBorder("medium") };
      }
      for (let row = 1; row <= finalRow; row += 1) {
        ws.getCell(row, 1).border = { ...(ws.getCell(row, 1).border || fullBorder("thin")), left: excelBorder("medium") };
        ws.getCell(row, 3).border = { ...(ws.getCell(row, 3).border || fullBorder("thin")), right: excelBorder("medium") };
        ws.getCell(row, lastCol).border = { ...(ws.getCell(row, lastCol).border || fullBorder("thin")), right: excelBorder("medium") };
      }
      pods.forEach((_pod, podIndex) => {
        const left = 4 + podIndex * 2;
        for (let row = 3; row <= finalRow; row += 1) {
          ws.getCell(row, left).border = { ...(ws.getCell(row, left).border || fullBorder("thin")), left: excelBorder("medium") };
        }
      });
      return ws;
    }

    function addMultiCarrierRobTransferSheet(workbook, name, sections, options = {}) {
      if (!sections.length) return null;
      const pods = sections[0].pods || [];
      if (!pods.length) return null;
      const ws = workbook.addWorksheet(name, {
        views: [{ showGridLines: false, state: "frozen", ySplit: 5 }]
      });
      if (options.tabColor) ws.properties.tabColor = { argb: options.tabColor };
      const lastCol = 3 + pods.length * 2;
      const copyLabels = cargoLabels.slice(0, 7);
      const finalRow = 5 + copyLabels.length + (sections.length - 1) * ROB_TRANSFER_SECTION_STEP;
      const headerFill = options.headerFill || "FF99CCFF";
      const noteFill = options.noteFill || "FFFFFFFF";
      const blockFill = options.blockFill || noteFill;
      const whiteFill = "FFFFFFFF";
      const headerFont = { name: "Carlito", size: 11, bold: true, color: { argb: "FF000000" } };
      const headerStyle = { fill: headerFill, font: headerFont };
      const noteStyle = { fill: noteFill, font: headerFont };
      const blockStyle = { fill: blockFill, font: headerFont };
      const valueStyle = { fill: whiteFill };

      for (let col = 1; col <= lastCol; col += 1) {
        let width = 7.5;
        if (col === 1) width = 8;
        else if (col === 2) width = 9;
        else if (col === 3) width = 11;
        ws.getColumn(col).width = width;
      }
      for (let row = 1; row <= finalRow; row += 1) {
        ws.getRow(row).height = row <= 5 ? 20 : 18;
      }

      safeMerge(ws, 1, 1, 1, lastCol);
      safeMerge(ws, 2, 1, 2, lastCol);
      setCell(ws, 1, 1, options.title || name, headerStyle);
      setCell(ws, 2, 1, options.note || "", noteStyle);

      sections.forEach((section, sectionIndex) => {
        const headerStart = 3 + sectionIndex * ROB_TRANSFER_SECTION_STEP;
        const dataStart = 6 + sectionIndex * ROB_TRANSFER_SECTION_STEP;
        const sectionPods = section.pods || pods;
        safeMerge(ws, headerStart, 1, headerStart, 3);
        safeMerge(ws, headerStart + 1, 1, headerStart + 1, 3);
        safeMerge(ws, headerStart + 2, 1, headerStart + 2, 3);
        setCell(ws, headerStart, 1, "POD", headerStyle);
        setCell(ws, headerStart + 1, 1, "ETA", headerStyle);
        setCell(ws, headerStart + 2, 1, "POL", headerStyle);
        sectionPods.forEach((pod, podIndex) => {
          const left = 4 + podIndex * 2;
          const right = left + 1;
          safeMerge(ws, headerStart, left, headerStart, right);
          safeMerge(ws, headerStart + 1, left, headerStart + 1, right);
          setCell(ws, headerStart, left, pod.port, headerStyle);
          setCell(ws, headerStart + 1, left, pod.eta, headerStyle);
          setCell(ws, headerStart + 2, left, "20'", headerStyle);
          setCell(ws, headerStart + 2, right, "40'", headerStyle);
        });

        safeMerge(ws, dataStart, 1, dataStart + 5, 2);
        setCell(ws, dataStart, 1, section.blockLabel || section.code || name, {
          ...blockStyle,
          alignment: { horizontal: "center", vertical: "middle" }
        });

        copyLabels.forEach((label, offset) => {
          const row = dataStart + offset;
          setCell(ws, row, 3, label, { ...blockStyle, alignment: { horizontal: "left", vertical: "middle" } });
          sectionPods.forEach((_pod, podIndex) => {
            const left = 4 + podIndex * 2;
            const right = left + 1;
            const leftFormula = section.valueFormula?.({ left, right, row, offset, podIndex, side: "left" });
            const rightFormula = section.valueFormula?.({ left, right, row, offset, podIndex, side: "right" });
            if (leftFormula) {
              setFormulaCell(ws, row, left, leftFormula, { ...valueStyle, numFmt: offset === 6 ? "0.0;-0.0;;@" : "0;-0;;@" });
            } else {
              setCell(ws, row, left, null, { ...valueStyle, numFmt: offset === 6 ? "0.0;-0.0;;@" : "0;-0;;@" });
            }
            if (offset === 6) {
              setCell(ws, row, right, null, { ...valueStyle, numFmt: "0.0;-0.0;;@" });
            } else if (rightFormula) {
              setFormulaCell(ws, row, right, rightFormula, { ...valueStyle, numFmt: "0;-0;;@" });
            } else {
              setCell(ws, row, right, null, { ...valueStyle, numFmt: "0;-0;;@" });
            }
          });
        });
      });

      for (let row = 1; row <= finalRow; row += 1) {
        for (let col = 1; col <= lastCol; col += 1) {
          const cell = ws.getCell(row, col);
          cell.border = cell.border || fullBorder("thin");
          cell.alignment = cell.alignment || { horizontal: "center", vertical: "middle" };
          cell.font = cell.font || { name: "Calibri", size: 11, color: { argb: "FF000000" } };
        }
      }
      sections.forEach((_section, sectionIndex) => {
        const headerStart = 3 + sectionIndex * ROB_TRANSFER_SECTION_STEP;
        const dataStart = 6 + sectionIndex * ROB_TRANSFER_SECTION_STEP;
        for (let col = 1; col <= lastCol; col += 1) {
          ws.getCell(headerStart + 2, col).border = { ...(ws.getCell(headerStart + 2, col).border || fullBorder("thin")), bottom: excelBorder("medium") };
          ws.getCell(dataStart + 6, col).border = { ...(ws.getCell(dataStart + 6, col).border || fullBorder("thin")), bottom: excelBorder("medium") };
        }
        for (let row = headerStart; row <= dataStart + 6; row += 1) {
          ws.getCell(row, 1).border = { ...(ws.getCell(row, 1).border || fullBorder("thin")), left: excelBorder("medium") };
          ws.getCell(row, 3).border = { ...(ws.getCell(row, 3).border || fullBorder("thin")), right: excelBorder("medium") };
          ws.getCell(row, lastCol).border = { ...(ws.getCell(row, lastCol).border || fullBorder("thin")), right: excelBorder("medium") };
        }
        pods.forEach((_pod, podIndex) => {
          const left = 4 + podIndex * 2;
          for (let row = headerStart; row <= dataStart + 6; row += 1) {
            ws.getCell(row, left).border = { ...(ws.getCell(row, left).border || fullBorder("thin")), left: excelBorder("medium") };
          }
        });
      });
      return ws;
    }

    function addRobInputSheet(workbook, wbMeta) {
      const pods = wbMeta?.model?.sheet?.pods || [];
      return addRobTransferSheet(workbook, "ROB_INPUT", pods, {
        title: "ROB_INPUT - paste previous ROB_OUTPUT values here",
        note: "Paste previous workbook ROB_OUTPUT D6 through the Weight row into D6. WB ROB reads this sheet automatically.",
        blockLabel: "WB ROB INPUT",
        headerFill: "FFB6D7A8",
        noteFill: "FFE2F0D9",
        blockFill: "FFD9EAD3",
        tabColor: "FF6AA84F"
      });
    }

    function addRobOutputSheet(workbook, ebMeta) {
      const pods = ebMeta?.model?.sheet?.pods || [];
      if (!pods.length) return null;
      const sourceSheet = excelSheetRef(ebMeta.ws.name);
      const totalStart = ebMeta.totalStart;
      return addRobTransferSheet(workbook, "ROB_OUTPUT", pods, {
        title: "ROB_OUTPUT - EB TOTAL to next cycle ROB_INPUT",
        note: "Copy D6 through the Weight row, then paste values to next workbook ROB_INPUT!D6. This copy area has no merged cells.",
        blockLabel: "EB TOTAL",
        headerFill: "FFF9CB9C",
        noteFill: "FFFCE4D6",
        blockFill: "FFF4CCCC",
        tabColor: "FFE69138",
        valueFormula: ({ offset, podIndex, side }) => {
          const ebLeft = ebMeta.podLeftCols[podIndex];
          const ebRight = ebMeta.podRightCols[podIndex];
          if (offset === 6) return side === "left" ? `${sourceSheet}!${excelCell(ebLeft, totalStart + offset)}` : "";
          return `${sourceSheet}!${excelCell(side === "left" ? ebLeft : ebRight, totalStart + offset)}`;
        }
      });
    }

    function addMultiCarrierRobInputSheet(workbook, wbMetas) {
      const sections = wbMetas.map(({ carrier, meta }) => ({
        code: carrier.code,
        pods: meta?.model?.sheet?.pods || [],
        blockLabel: `${carrier.code} ROB INPUT`
      }));
      return addMultiCarrierRobTransferSheet(workbook, "ROB_INPUT", sections, {
        title: "ROB_INPUT - paste previous ROB_OUTPUT values here",
        note: "Paste each carrier section from previous ROB_OUTPUT into the matching carrier section here.",
        headerFill: "FFB6D7A8",
        noteFill: "FFE2F0D9",
        blockFill: "FFD9EAD3",
        tabColor: "FF6AA84F"
      });
    }

    function addMultiCarrierRobOutputSheet(workbook, ebMetas) {
      const sections = ebMetas.map(({ carrier, meta }) => {
        const sourceSheet = excelSheetRef(meta.ws.name);
        const totalStart = meta.totalStart;
        return {
          code: carrier.code,
          pods: meta?.model?.sheet?.pods || [],
          blockLabel: `${carrier.code} EB TOTAL`,
          valueFormula: ({ offset, podIndex, side }) => {
            const ebLeft = meta.podLeftCols[podIndex];
            const ebRight = meta.podRightCols[podIndex];
            if (offset === 6) return side === "left" ? `${sourceSheet}!${excelCell(ebLeft, totalStart + offset)}` : "";
            return `${sourceSheet}!${excelCell(side === "left" ? ebLeft : ebRight, totalStart + offset)}`;
          }
        };
      });
      return addMultiCarrierRobTransferSheet(workbook, "ROB_OUTPUT", sections, {
        title: "ROB_OUTPUT - EB TOTAL to next cycle ROB_INPUT",
        note: "Copy each carrier section through the Weight row, then paste values to next workbook ROB_INPUT.",
        headerFill: "FFF9CB9C",
        noteFill: "FFFCE4D6",
        blockFill: "FFF4CCCC",
        tabColor: "FFE69138"
      });
    }

    function setFormulaOnly(cell, formula, numFmt = "0;-0;;@") {
      cell.value = { formula: safeExcelFormula(formula), result: 0 };
      cell.numFmt = numFmt;
    }

    function applyEbRobCarryover(wbMeta, ebMeta) {
      const wbPods = wbMeta?.model?.sheet?.pods || [];
      const ebPods = ebMeta?.model?.sheet?.pods || [];
      const wbSheetRef = excelSheetRef(wbMeta.ws.name);
      ebPods.forEach((ebPod, ebPodIndex) => {
        const wbPodIndex = findPodIndexByCall(wbPods, ebPod, {
          uniquePortFallback: true,
          targetPortCount: portOccurrenceCount(ebPods, ebPod.port)
        });
        if (wbPodIndex < 0) return;

        const ebLeft = ebMeta.podLeftCols[ebPodIndex];
        const ebRight = ebMeta.podRightCols[ebPodIndex];
        const wbLeft = wbMeta.podLeftCols[wbPodIndex];
        const wbRight = wbMeta.podRightCols[wbPodIndex];

        for (let offset = 0; offset < 6; offset += 1) {
          const row = 6 + offset;
          setFormulaOnly(
            ebMeta.ws.getCell(row, ebLeft),
            `${wbSheetRef}!${excelCell(wbLeft, wbMeta.totalStart + offset)}`
          );
          setFormulaOnly(
            ebMeta.ws.getCell(row, ebRight),
            `${wbSheetRef}!${excelCell(wbRight, wbMeta.totalStart + offset)}`
          );
        }
        setFormulaOnly(
          ebMeta.ws.getCell(12, ebLeft),
          `${wbSheetRef}!${excelCell(wbLeft, wbMeta.totalStart + 6)}`,
          "0.0;-0.0;;@"
        );
      });
    }

    function setExportButtonsDisabled(disabled) {
      document.querySelectorAll("#exportXls").forEach((button) => {
        button.disabled = disabled;
      });
    }

    function setExportProgress(percent, text, visible = true) {
      const value = Math.max(0, Math.min(100, Math.round(percent)));
      $("exportProgress").value = value;
      $("exportProgressPercent").textContent = `${value}%`;
      $("exportProgressText").textContent = text;
      $("exportProgressWrap").classList.toggle("hidden", !visible);
    }

    function waitForUiPaint() {
      return new Promise((resolve) => requestAnimationFrame(() => setTimeout(resolve, 0)));
    }

    async function updateExportProgress(percent, text) {
      setExportProgress(percent, text, true);
      $("status").textContent = text;
      await waitForUiPaint();
    }

    async function exportXls() {
      saveEntriesFromCurrentTable();
      if (!window.ExcelJS) {
        $("status").textContent = "Excel export library is not loaded";
        return;
      }
      setExportButtonsDisabled(true);
      let exported = false;
      try {
        await updateExportProgress(3, "正在准备 Excel 数据");
        const input = readInputs();
        const workbook = new ExcelJS.Workbook();
        workbook.creator = "Space Control Generator";
        workbook.created = new Date();
        workbook.calcProperties = workbook.calcProperties || {};
        workbook.calcProperties.fullCalcOnLoad = true;
        workbook.calcProperties.forceFullCalc = true;
        const carriers = input.carriers?.length ? input.carriers : [defaultCarrier()];
        const isMultiCarrier = carriers.length > 1;
        const buildUnits = isMultiCarrier ? 3 + carriers.length * 2 : 3;
        let completedUnits = 0;
        const markBuilt = async (label) => {
          completedUnits += 1;
          await updateExportProgress(8 + (completedUnits / buildUnits) * 68, label);
        };

        if (!isMultiCarrier) {
          const carrier = carriers[0];
          const wbName = carrierSheetName("WB", carrier, false);
          const ebName = carrierSheetName("EB", carrier, false);
          const wbMeta = buildExcelSheet(
            workbook,
            inputForSheet(input, "WB", wbName, sheetDataForCarrier(input, "WB", carrier, false), 0),
            wbName
          );
          await markBuilt("WB 工作表已生成");
          const ebMeta = buildExcelSheet(
            workbook,
            inputForSheet(input, "EB", ebName, sheetDataForCarrier(input, "EB", carrier, false), 0),
            ebName
          );
          await markBuilt("EB 工作表已生成");
          applyEbRobCarryover(wbMeta, ebMeta);
          addRobInputSheet(workbook, wbMeta);
          addRobOutputSheet(workbook, ebMeta);
          await markBuilt("ROB 公式和传递表已生成");
        } else {
          const wbTotalMeta = buildExcelSheet(
            workbook,
            inputForSheet(input, "WB", totalSheetName("WB"), sheetDataForTotal(input, "WB", carriers), 0),
            totalSheetName("WB")
          );
          await markBuilt("WB_TOTAL 已生成");
          const ebTotalMeta = buildExcelSheet(
            workbook,
            inputForSheet(input, "EB", totalSheetName("EB"), sheetDataForTotal(input, "EB", carriers), 0),
            totalSheetName("EB")
          );
          await markBuilt("EB_TOTAL 已生成");
          const wbCarrierMetas = [];
          for (let index = 0; index < carriers.length; index += 1) {
            const carrier = carriers[index];
            const sheetName = carrierSheetName("WB", carrier, true);
            const meta = buildExcelSheet(
              workbook,
              inputForSheet(
                input,
                "WB",
                sheetName,
                sheetDataForCarrier(input, "WB", carrier, true),
                index * ROB_TRANSFER_SECTION_STEP
              ),
              sheetName
            );
            wbCarrierMetas.push({ carrier, meta });
            await markBuilt(`${sheetName} 已生成`);
          }
          const ebCarrierMetas = [];
          for (let index = 0; index < carriers.length; index += 1) {
            const carrier = carriers[index];
            const sheetName = carrierSheetName("EB", carrier, true);
            const meta = buildExcelSheet(
              workbook,
              inputForSheet(
                input,
                "EB",
                sheetName,
                sheetDataForCarrier(input, "EB", carrier, true),
                index * ROB_TRANSFER_SECTION_STEP
              ),
              sheetName
            );
            ebCarrierMetas.push({ carrier, meta });
            await markBuilt(`${sheetName} 已生成`);
          }
          wbCarrierMetas.forEach((item, index) => {
            applyEbRobCarryover(item.meta, ebCarrierMetas[index].meta);
          });
          applyTotalSheetFormulas(wbTotalMeta, wbCarrierMetas.map((item) => item.meta));
          applyTotalSheetFormulas(ebTotalMeta, ebCarrierMetas.map((item) => item.meta));
          addMultiCarrierRobInputSheet(workbook, wbCarrierMetas);
          addMultiCarrierRobOutputSheet(workbook, ebCarrierMetas);
          await markBuilt("TOTAL、ROB 公式和传递表已生成");
        }

        await updateExportProgress(82, "正在写入 Excel 文件");
        const buffer = await workbook.xlsx.writeBuffer();
        await updateExportProgress(96, "正在准备下载");
        const blob = new Blob([buffer], {
          type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        const laneName = normalizeText(input.serviceLane).split(/[\s/]+/)[0] || "LANE";
        link.download = `${laneName} ${input.vvd}.xlsx`.replace(/[\\/:*?"<>|]+/g, "-");
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
        saveHistoryRecord({
          vvd: input.vvd,
          lane: input.serviceLane,
          vesselName: input.vesselName,
          updatedAt: new Date().toISOString()
        }, "exported");
        exported = true;
        setExportProgress(100, "Excel 已导出", true);
        $("status").textContent = "Excel 已导出";
      } catch (error) {
        console.error(error);
        setExportProgress($("exportProgress").value, "导出失败", true);
        $("status").textContent = `导出失败：${error.message || error}`;
      } finally {
        setExportButtonsDisabled(false);
        if (exported) setTimeout(() => setExportProgress(0, "准备导出", false), 2500);
      }
    }

    function rerenderIfScheduleReady() {
      if (!state.currentLookup) return;
      render();
